<!DOCTYPE html> <!-- HTML5 -->

<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐾 Mascotas</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: #1e1e2f;
            color: white;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .contenedor {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: #2c2c3e;
            padding: 15px;
            border-radius: 15px;
        }

        button {
            margin-top: 10px;
            padding: 8px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
        }

        .adoptar {
            background: #4CAF50;
            color: white;
        }

        .postulantes {
            background: #2196F3;
            color: white;
        }

    </style>

</head>

<body>

<h1>🐶 Mascotas disponibles</h1>

<div id="contenedor" class="contenedor"></div>

<script>

    // URL dinámica (PRO)
    const API_URL = `${window.location.origin}/api/mascotas`;

    const contenedor = document.getElementById("contenedor");

    const token = localStorage.getItem("token");

    const user = JSON.parse(localStorage.getItem("user")) || {};



    // --------------------------------------------------
    // CARGAR MASCOTAS
    // --------------------------------------------------

    const obtenerMascotas = async () => {

        try {

            const res = await fetch(API_URL);

            const data = await res.json();

            const mascotas = data.data || [];

            contenedor.innerHTML = "";

            mascotas.forEach(mascota => {

                const card = document.createElement("div");
                card.classList.add("card");

                const esAdoptado = mascota.estado === "adoptado";

                card.innerHTML = `
                    <h3>${mascota.nombre}</h3>
                    <p>Edad: ${mascota.edad}</p>
                    <p>${mascota.descripcion}</p>

                    <p>
                        Estado: 
                        <strong style="color:${esAdoptado ? "red" : "green"};">
                            ${mascota.estado}
                        </strong>
                    </p>

                    <button 
                        class="adoptar"
                        onclick="adoptar(${mascota.id})"
                        ${esAdoptado ? "disabled" : ""}
                    >
                        ❤️ Adoptar
                    </button>

                    ${user.rol === "rescatista" ? `
                        <button 
                            class="postulantes"
                            onclick="verPostulantes(${mascota.id})"
                        >
                            👀 Ver postulantes
                        </button>
                    ` : ""}
                `;

                contenedor.appendChild(card);
            });

        } catch (error) {
            console.error(error);
        }
    };



    // --------------------------------------------------
    // ADOPTAR
    // --------------------------------------------------

    const adoptar = async (mascotaId) => {

        if (!token) {
            alert("Debes iniciar sesión");
            return;
        }

        await fetch(`/api/solicitudes`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${token}`
            },
            body: JSON.stringify({ mascotaId })
        });

        alert("Solicitud enviada");
    };



    // --------------------------------------------------
    // VER POSTULANTES
    // --------------------------------------------------

    const verPostulantes = (id) => {

        // Redirige con parámetro
        window.location.href = `/postulantes.html?mascotaId=${id}`;
    };



    // --------------------------------------------------
    // INICIO
    // --------------------------------------------------

    obtenerMascotas();

</script>

</body>

</html>
