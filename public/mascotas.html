<!DOCTYPE html> <!-- Indicamos que usamos HTML5 -->

<html lang="es"> <!-- Idioma español -->

<head>

    <!-- Codificación de caracteres (permite tildes, ñ, etc.) -->
    <meta charset="UTF-8">

    <!-- Título de la pestaña -->
    <title>Mascotas</title>

    <!-- Importamos Bootstrap para estilos rápidos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        /* Fondo general de la página */
        body {
            background: #f5f6fa; /* color gris claro */
        }

        /* Estilo de las tarjetas */
        .card {
            border-radius: 15px; /* bordes redondeados */
            transition: 0.3s; /* animación suave */
        }

        /* Efecto al pasar el mouse */
        .card:hover {
            transform: scale(1.02); /* crece levemente */
        }

        /* Imagen dentro de la tarjeta */
        .card img {
            height: 200px; /* altura fija */
            object-fit: cover; /* recorta sin deformar */
            border-top-left-radius: 15px; /* bordes superiores */
            border-top-right-radius: 15px;
        }

    </style>

</head>

<body>

<!-- Contenedor principal -->
<div class="container mt-4">

    <!-- HEADER (título + botones) -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <!-- Título -->
        <h2>🐶 Mascotas en adopción</h2>

        <!-- Contenedor de botones -->
        <div>

            <!-- Botón que lleva a la vista de usuarios -->
            <a href="usuarios.html" class="btn btn-outline-dark btn-sm">
                Usuarios
            </a>

            <!-- Botón para cerrar sesión -->
            <button class="btn btn-danger btn-sm" onclick="logout()">
                Cerrar sesión
            </button>

        </div>

    </div>

    <!-- Contenedor donde se insertarán las mascotas dinámicamente -->
    <div class="row" id="contenedorMascotas"></div>

</div>

<!-- Scripts externos -->
<script src="js/utils.js"></script> <!-- función mostrarMensaje -->
<script src="js/auth.js"></script> <!-- logout y manejo de token -->

<script>

    // --------------------------------------------------
    // FUNCIÓN PARA OBTENER MASCOTAS DESDE EL BACKEND
    // --------------------------------------------------

    async function cargarMascotas() {

        // Obtenemos el token guardado en el navegador
        const token = localStorage.getItem("token");

        // Si no hay token, no dejamos continuar
        if (!token) {

            mostrarMensaje("Debes iniciar sesión", "danger");
            return; // detenemos ejecución
        }

        try {

            // Hacemos petición GET al backend
            const res = await fetch("/api/mascotas", {

                // Enviamos el token en los headers
                headers: {
                    "Authorization": "Bearer " + token
                }

            });

            // Convertimos la respuesta a JSON
            const data = await res.json();

            // Llamamos a la función que pinta las mascotas
            mostrarMascotas(data.data);

        } catch (error) {

            // Si ocurre error lo mostramos en consola
            console.error(error);

            // Y mostramos mensaje al usuario
            mostrarMensaje("Error al cargar mascotas", "danger");
        }
    }


    // --------------------------------------------------
    // FUNCIÓN PARA MOSTRAR LAS MASCOTAS EN PANTALLA
    // --------------------------------------------------

    function mostrarMascotas(mascotas) {

        // Obtenemos el contenedor donde irán las tarjetas
        const contenedor = document.getElementById("contenedorMascotas");

        // Limpiamos el contenido previo
        contenedor.innerHTML = "";

        // Recorremos el array de mascotas
        mascotas.forEach(mascota => {

            // Creamos una columna (Bootstrap grid)
            const col = document.createElement("div");

            // Clases para diseño responsive
            col.className = "col-md-4 mb-4";

            // Insertamos HTML dinámico
            col.innerHTML = `

                <!-- Tarjeta -->
                <div class="card h-100">

                    <!-- Imagen (placeholder temporal) -->
                    <img src="https://place-puppy.com/300x200" alt="Mascota">

                    <!-- Cuerpo de la tarjeta -->
                    <div class="card-body">

                        <!-- Nombre de la mascota -->
                        <h5 class="card-title">${mascota.nombre}</h5>

                        <!-- Información básica -->
                        <p class="card-text">
                            Edad: ${mascota.edad}<br>
                            Porte: ${mascota.porte}<br>
                            Energía: ${mascota.energia}
                        </p>

                        <!-- Descripción -->
                        <p>${mascota.descripcion}</p>

                    </div>

                    <!-- Footer de la tarjeta -->
                    <div class="card-footer d-flex justify-content-between">

                        <!-- Estado de la mascota -->
                        <span class="badge bg-success">
                            ${mascota.estado}
                        </span>

                        <!-- Botón de interés -->
                        <button class="btn btn-primary btn-sm">
                            Me interesa ❤️
                        </button>

                    </div>

                </div>

            `;

            // Agregamos la tarjeta al contenedor
            contenedor.appendChild(col);
        });
    }


    // --------------------------------------------------
    // AUTO EJECUCIÓN AL CARGAR LA PÁGINA
    // --------------------------------------------------

    cargarMascotas(); // ejecuta la carga automáticamente

</script>

</body>
</html>
