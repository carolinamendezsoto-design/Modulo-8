<!-- ===================================================== -->
<!-- DOCUMENTO HTML5 -->
<!-- ===================================================== -->
<!DOCTYPE html>

<html lang="es">

<head>

    <!-- Codificación UTF-8 -->
    <meta charset="UTF-8">

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título -->
    <title>🐾 Mascotas</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>

        /* Fuente y fondo */
        body {
            font-family: 'Poppins', sans-serif;
            background-image: url("img/Huellitas_de_Amor.jpg");
            background-size: cover;
            background-attachment: fixed;
        }

        /* Overlay oscuro */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.5));
            z-index: -1;
        }

        /* Card estilo glass */
        .card {
            border-radius: 20px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        /* Imagen */
        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 10px;
        }

    </style>

</head>

<body class="p-4 text-white">

<div class="container">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <h3>🐶 Mascotas disponibles</h3>

        <div>

            <!-- Volver -->
            <a id="btnVolver" class="btn btn-light btn-sm me-2 fw-bold"></a>

            <!-- Logout -->
            <button class="btn btn-danger btn-sm" onclick="logout()">Cerrar sesión</button>

        </div>

    </div>

    <!-- CONTENEDOR -->
    <div id="contenedor" class="row g-3"></div>

</div>

<script src="js/utils.js"></script>
<script src="js/auth.js"></script>

<script>

// API endpoint
const API = "/api/mascotas";

// contenedor
const contenedor = document.getElementById("contenedor");

// token
const token = localStorage.getItem("token");

// user
let user = null;

try {
    user = JSON.parse(localStorage.getItem("user"));
} catch {
    user = null;
}

// rol
const rol = user?.rol?.toLowerCase()?.trim();

// botón volver
const btnVolver = document.getElementById("btnVolver");

if (!rol) {

    btnVolver.style.display = "none";

} else if (rol === "admin") {

    btnVolver.href = "admin.html";
    btnVolver.textContent = "← Panel Admin";

} else if (rol === "rescatista") {

    btnVolver.href = "rescatista.html";
    btnVolver.textContent = "← Mis Mascotas";

} else {

    btnVolver.style.display = "none";
}


// ------------------------------------------------------
// CARGAR MASCOTAS
// ------------------------------------------------------

async function obtenerMascotas() {

    try {

        contenedor.innerHTML = "<p>Cargando...</p>";

        const res = await fetch(API);

        const data = await res.json();

        if (!res.ok) throw new Error(data.message);

        const mascotas = data.data || [];

        contenedor.innerHTML = "";

        if (!mascotas.length) {
            contenedor.innerHTML = "<p>No hay mascotas</p>";
            return;
        }

        mascotas.forEach(m => {

            const col = document.createElement("div");
            col.className = "col-md-4";

            const adoptado = m.estado === "adoptado";

            // 🔥 FIX imagen correcta
            const imagen = m.imagen 
                ? `/uploads/${m.imagen}` 
                : "img/default.jpg";

            col.innerHTML = `
                <div class="card p-3 text-white">

                    <!-- Imagen -->
                    <img src="${imagen}" alt="mascota">

                    <!-- Nombre -->
                    <h5>${m.nombre}</h5>

                    <!-- Raza -->
                    <p><strong>Raza:</strong> ${m.raza || "No definida"}</p>

                    <!-- Edad -->
                    <p><strong>Edad:</strong> ${m.edad}</p>

                    <!-- Descripción -->
                    <p>${m.descripcion || ""}</p>

                    <!-- Estado -->
                    <p><strong>${m.estado}</strong></p>

                    <!-- Botón adoptar -->
                    <button 
                        class="btn btn-success mb-2"
                        onclick="adoptar(${m.id})"
                        ${adoptado ? "disabled" : ""}
                    >
                        Adoptar
                    </button>

                    <!-- Solo rescatista -->
                    ${rol === "rescatista" ? `
                        <button 
                            class="btn btn-primary"
                            onclick="verPostulantes(${m.id})"
                        >
                            Ver postulantes
                        </button>
                    ` : ""}

                </div>
            `;

            contenedor.appendChild(col);
        });

    } catch (error) {

        console.error(error);
        mostrarMensaje(error.message, "danger");
    }
}


// ------------------------------------------------------
// ADOPTAR
// ------------------------------------------------------

async function adoptar(id) {

    if (!token) {
        mostrarMensaje("Debes iniciar sesión", "warning");
        return;
    }

    try {

        const res = await fetch("/api/solicitudes", {

            method: "POST",

            headers: {
                "Content-Type": "application/json",
                Authorization: "Bearer " + token
            },

            body: JSON.stringify({ mascotaId: id })
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.message);

        mostrarMensaje("Solicitud enviada 🐾");

    } catch (error) {

        console.error(error);
        mostrarMensaje(error.message, "danger");
    }
}


// ------------------------------------------------------
// REDIRECCIÓN
// ------------------------------------------------------

function verPostulantes(id) {
    window.location.href = `postulantes.html?id=${id}`;
}

// INIT
obtenerMascotas();

</script>

</body>
</html>
