<!DOCTYPE html> <!-- HTML5 -->

<html lang="es"> <!-- Idioma -->

<head>

    <!-- Codificación -->
    <meta charset="UTF-8">

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título -->
    <title>🐾 Mascotas</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>

        /* -------------------------------------------------- */
        /* FONDO GLOBAL */
        /* -------------------------------------------------- */

        body {

            font-family: 'Poppins', sans-serif; /* tipografía */

            background-image: url("img/Huellitas_de_Amor.jpg"); /* fondo */

            background-size: cover; /* cubrir */

            background-attachment: fixed; /* fijo */

            padding: 20px;
        }

        /* OVERLAY */
        body::before {

            content: "";

            position: fixed;

            inset: 0;

            background: linear-gradient(
                rgba(0,0,0,0.6),
                rgba(0,0,0,0.4)
            );

            z-index: -1;
        }

        /* HEADER */
        .header {

            display: flex;

            justify-content: space-between;

            align-items: center;

            margin-bottom: 20px;

            color: white;
        }

        /* GRID */
        .contenedor {

            display: grid;

            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));

            gap: 20px;
        }

        /* CARD */
        .card {

            border-radius: 20px;

            padding: 15px;

            background: rgba(255,255,255,0.15);

            backdrop-filter: blur(12px);

            border: 1px solid rgba(255,255,255,0.2);

            color: white;

            box-shadow: 0 15px 40px rgba(0,0,0,0.3);

            transition: 0.3s;
        }

        /* HOVER */
        .card:hover {

            transform: translateY(-5px);
        }

        /* IMAGEN */
        .img {

            width: 100%;

            height: 180px;

            object-fit: cover;

            border-radius: 15px;

            margin-bottom: 10px;
        }

        /* BOTONES */
        .btn {

            border-radius: 10px;
        }

    </style>

</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">

        <h3>🐶 Mascotas disponibles</h3>

        <button class="btn btn-danger btn-sm" onclick="logout()">
            Cerrar sesión
        </button>

    </div>

    <!-- CONTENEDOR -->
    <div id="contenedor" class="contenedor"></div>

</div>

<!-- SCRIPTS -->
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>

<script>

    // --------------------------------------------------
    // VARIABLES
    // --------------------------------------------------

    const API = "/api/mascotas"; // endpoint

    const contenedor = document.getElementById("contenedor"); // DOM

    const token = localStorage.getItem("token"); // token

    const user = JSON.parse(localStorage.getItem("user")) || {}; // usuario


    // --------------------------------------------------
    // CARGAR MASCOTAS
    // --------------------------------------------------

    async function obtenerMascotas() {

        try {

            const res = await fetch(API);

            const data = await res.json();

            const mascotas = data.data || [];

            contenedor.innerHTML = ""; // limpiar

            // Si no hay mascotas
            if (!mascotas.length) {
                contenedor.innerHTML = "<p class='text-white'>No hay mascotas</p>";
                return;
            }

            // Recorrer mascotas
            mascotas.forEach(m => {

                const card = document.createElement("div");

                card.className = "card";

                const adoptado = m.estado === "adoptado";

                card.innerHTML = `

                    <!-- IMAGEN -->
                    <img 
                        src="${m.imagen ? "/uploads/" + m.imagen : "img/default.jpg"}" 
                        class="img"
                    >

                    <!-- NOMBRE -->
                    <h5>${m.nombre}</h5>

                    <!-- INFO -->
                    <p>Edad: ${m.edad}</p>

                    <p>${m.descripcion}</p>

                    <!-- ESTADO -->
                    <p>
                        Estado: 
                        <strong style="color:${adoptado ? "red" : "lightgreen"};">
                            ${m.estado}
                        </strong>
                    </p>

                    <!-- BOTÓN ADOPTAR -->
                    <button 
                        class="btn btn-success w-100 mb-2"
                        onclick="adoptar(${m.id})"
                        ${adoptado ? "disabled" : ""}
                    >
                        ❤️ Adoptar
                    </button>

                    <!-- BOTÓN POSTULANTES -->
                    ${user.rol === "rescatista" ? `
                        <button 
                            class="btn btn-primary w-100"
                            onclick="verPostulantes(${m.id})"
                        >
                            👀 Ver postulantes
                        </button>
                    ` : ""}

                `;

                contenedor.appendChild(card);
            });

        } catch (error) {

            console.error(error);

            mostrarMensaje("Error al cargar mascotas", "danger");
        }
    }


    // --------------------------------------------------
    // ADOPTAR
    // --------------------------------------------------

    async function adoptar(id) {

        if (!token) {
            mostrarMensaje("Debes iniciar sesión", "danger");
            return;
        }

        try {

            const res = await fetch("/api/solicitudes", {

                method: "POST",

                headers: {
                    "Content-Type": "application/json",
                    Authorization: "Bearer " + token
                },

                body: JSON.stringify({ mascotaId: id })
            });

            const data = await res.json();

            if (!res.ok) {
                mostrarMensaje(data.message || "Error", "danger");
                return;
            }

            mostrarMensaje("Solicitud enviada 🐾");

        } catch (error) {

            console.error(error);

            mostrarMensaje("Error al adoptar", "danger");
        }
    }


    // --------------------------------------------------
    // VER POSTULANTES
    // --------------------------------------------------

    function verPostulantes(id) {

        window.location.href = `postulantes.html?id=${id}`;
    }


    // --------------------------------------------------
    // INICIO
    // --------------------------------------------------

    obtenerMascotas();

</script>

</body>
</html>
