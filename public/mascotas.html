<!DOCTYPE html> <!-- Indicamos que usamos HTML5 -->

<html lang="es"> <!-- Idioma español -->

<head>

    <!-- Codificación de caracteres (permite tildes y ñ) -->
    <meta charset="UTF-8">

    <!-- Título de la pestaña -->
    <title>Mascotas</title>

    <!-- Importamos Bootstrap para estilos rápidos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        /* Fondo general de la página */
        body {
            background: #f5f6fa;
        }

        /* Estilo de las tarjetas */
        .card {
            border-radius: 15px; /* bordes redondeados */
            transition: 0.3s; /* animación suave */
        }

        /* Efecto hover */
        .card:hover {
            transform: scale(1.02);
        }

        /* Imagen dentro de la tarjeta */
        .card img {
            height: 200px; /* altura fija */
            object-fit: cover; /* evita deformación */
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
        }

    </style>

</head>

<body>

<!-- Contenedor principal -->
<div class="container mt-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <!-- LADO IZQUIERDO -->
        <div class="d-flex align-items-center gap-2">

            <!-- Título -->
            <h2 class="m-0">🐶 Mascotas en adopción</h2>

            <!-- 🔥 BOTÓN PARA CREAR MASCOTA -->
            <a href="crear-mascota.html" class="btn btn-success btn-sm">
                + Crear
            </a>

        </div>

        <!-- LADO DERECHO -->
        <div>

            <!-- Botón para ver usuarios -->
            <a href="usuarios.html" class="btn btn-outline-dark btn-sm">
                Usuarios
            </a>

            <!-- Botón cerrar sesión -->
            <button class="btn btn-danger btn-sm" onclick="logout()">
                Cerrar sesión
            </button>

        </div>

    </div>

    <!-- CONTENEDOR DE MASCOTAS -->
    <div class="row" id="contenedorMascotas"></div>

</div>

<!-- Scripts externos -->
<script src="js/utils.js"></script> <!-- mensajes -->
<script src="js/auth.js"></script> <!-- login / logout -->

<script>

    // --------------------------------------------------
    // FUNCIÓN PARA CARGAR MASCOTAS DESDE BACKEND
    // --------------------------------------------------

    async function cargarMascotas() {

        // Obtenemos token desde localStorage
        const token = localStorage.getItem("token");

        // Si no existe token → usuario no autenticado
        if (!token) {
            mostrarMensaje("Debes iniciar sesión", "danger");
            return;
        }

        try {

            // Petición GET al backend
            const res = await fetch("/api/mascotas", {

                // Enviamos token en headers
                headers: {
                    "Authorization": "Bearer " + token
                }

            });

            // Convertimos respuesta a JSON
            const data = await res.json();

            // 🔥 Soporta ambos formatos:
            // { data: [...] } o [...]
            const mascotas = data.data || data;

            // Si no hay mascotas
            if (!mascotas || mascotas.length === 0) {
                document.getElementById("contenedorMascotas").innerHTML =
                    "<p>No hay mascotas aún 🐾</p>";
                return;
            }

            // Llamamos a render
            mostrarMascotas(mascotas);

        } catch (error) {

            // Error en consola
            console.error(error);

            // Mensaje al usuario
            mostrarMensaje("Error al cargar mascotas", "danger");
        }
    }


    // --------------------------------------------------
    // FUNCIÓN PARA MOSTRAR MASCOTAS
    // --------------------------------------------------

    function mostrarMascotas(mascotas) {

        // Obtenemos contenedor
        const contenedor = document.getElementById("contenedorMascotas");

        // Limpiamos contenido previo
        contenedor.innerHTML = "";

        // Recorremos cada mascota
        mascotas.forEach(mascota => {

            // Creamos columna Bootstrap
            const col = document.createElement("div");
            col.className = "col-md-4 mb-4";

            // 🔥 Imagen dinámica o fallback
            const imageUrl = mascota.imagen
                ? `/uploads/${mascota.imagen}`
                : "https://place-puppy.com/300x200";

            // Insertamos HTML
            col.innerHTML = `

                <div class="card h-100">

                    <!-- Imagen -->
                    <img src="${imageUrl}" alt="Mascota">

                    <!-- Body -->
                    <div class="card-body">

                        <h5>${mascota.nombre}</h5>

                        <p>
                            Edad: ${mascota.edad}<br>
                            Porte: ${mascota.porte}<br>
                            Energía: ${mascota.energia}
                        </p>

                        <p>${mascota.descripcion}</p>

                    </div>

                    <!-- Footer -->
                    <div class="card-footer d-flex justify-content-between">

                        <!-- Estado -->
                        <span class="badge bg-success">
                            ${mascota.estado}
                        </span>

                        <!-- Botón -->
                        <button class="btn btn-primary btn-sm">
                            Me interesa ❤️
                        </button>

                    </div>

                </div>
            `;

            // Agregamos al DOM
            contenedor.appendChild(col);
        });
    }


    // --------------------------------------------------
    // AUTO EJECUCIÓN
    // --------------------------------------------------

    cargarMascotas();

</script>

</body>
</html>
