<!DOCTYPE html> <!-- Indicamos HTML5 -->

<html lang="es"> <!-- Idioma español -->

<head>

<!-- ================= META ================= -->

<meta charset="UTF-8"> <!-- Permite caracteres especiales -->
<meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsive -->

<title>🐾 Mascotas</title> <!-- Título pestaña -->

<!-- ================= BOOTSTRAP ================= -->

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> <!-- Librería CSS -->

<!-- ================= ESTILOS ================= -->

<style>

/* Overlay oscuro para mejorar contraste del fondo */
body::before {
    content:""; /* obligatorio en pseudo-elementos */
    position:fixed; /* ocupa toda la pantalla */
    inset:0; /* top, right, bottom, left = 0 */
    background:rgba(0,0,0,0.6); /* oscurece */
    z-index:-1; /* queda detrás */
}

/* Tarjetas estilo glassmorphism */
.card {
    border-radius:20px; /* bordes redondeados */
    backdrop-filter:blur(12px); /* efecto vidrio */
    background:rgba(255,255,255,0.15); /* transparencia */
    border:1px solid rgba(255,255,255,0.2); /* borde suave */
    box-shadow:0 15px 40px rgba(0,0,0,0.4); /* sombra */
}

/* Animación hover */
.card:hover {
    transform:translateY(-5px); /* levanta tarjeta */
}

/* Animación campana */
@keyframes vibrar {
    0%{transform:rotate(0);} /* inicio */
    25%{transform:rotate(-10deg);} /* izquierda */
    50%{transform:rotate(10deg);} /* derecha */
    75%{transform:rotate(-6deg);} /* leve */
    100%{transform:rotate(0);} /* vuelve */
}

/* Clase cuando hay notificaciones */
.campana-activa {
    animation:vibrar 0.6s infinite; /* animación infinita */
}

</style>

</head>

<!-- ================= BODY ================= -->

<body class="p-4 text-white" style="background:url('img/Huellitas_de_Amor.jpg') center/cover fixed;"> <!-- fondo + padding -->

<div class="container"> <!-- contenedor bootstrap -->

    <!-- ================= HEADER ================= -->
    <div class="d-flex justify-content-between align-items-center mb-4"> <!-- flex header -->

        <h3>🐶 Mascotas</h3> <!-- título -->

        <div class="d-flex align-items-center gap-3"> <!-- contenedor botones -->

            <!-- CAMPANA -->
            <div id="campana" style="position:relative; cursor:pointer;" onclick="irNotificaciones()"> <!-- clickable -->

                <span style="font-size:26px;">🔔</span> <!-- icono -->

                <!-- CONTADOR -->
                <span id="contadorNoti"
                    class="badge bg-danger"
                    style="position:absolute; top:-8px; right:-10px; display:none;">
                </span>

            </div>

            <!-- LOGOUT -->
            <button class="btn btn-danger" onclick="logout()"> <!-- función global -->
                Cerrar sesión
            </button>

        </div>

    </div>

    <!-- ================= LISTA ================= -->
    <div id="contenedorMascotas" class="row"></div> <!-- donde se renderizan -->

</div>

<!-- ================= MODAL ================= -->
<div class="modal fade" id="modalAdopcion"> <!-- modal bootstrap -->

    <div class="modal-dialog"> <!-- contenedor modal -->

        <div class="modal-content text-dark"> <!-- contenido -->

            <div class="modal-header"> <!-- header modal -->
                <h5 class="modal-title">Postular a adopción</h5> <!-- título -->
                <button class="btn-close" data-bs-dismiss="modal"></button> <!-- cerrar -->
            </div>

            <div class="modal-body"> <!-- cuerpo -->

                <!-- INPUT edad -->
                <div class="mb-3">
                    <label>Edad</label>
                    <input id="edad" class="form-control"> <!-- input -->
                </div>

                <!-- INPUT experiencia -->
                <div class="mb-3">
                    <label>Experiencia</label>
                    <textarea id="experiencia" class="form-control"></textarea>
                </div>

                <!-- INPUT espacio -->
                <div class="mb-3">
                    <label>Espacio</label>
                    <textarea id="espacio" class="form-control"></textarea>
                </div>

            </div>

            <div class="modal-footer"> <!-- footer -->

                <button class="btn btn-secondary" data-bs-dismiss="modal">
                    Cancelar
                </button>

                <button class="btn btn-success" onclick="enviarSolicitud()">
                    Enviar
                </button>

            </div>

        </div>

    </div>

</div>

<!-- ================= SCRIPTS ================= -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script> <!-- JS bootstrap -->
<script src="js/utils.js"></script> <!-- funciones UI -->
<script src="js/auth.js"></script> <!-- auth global -->

<script>

// ================= TOKEN =================
const token = localStorage.getItem("token"); // obtenemos token guardado

// ================= VALIDACIÓN =================
if (!token) { // si no hay token
    mostrarMensaje("Debes iniciar sesión", "danger"); // aviso
    setTimeout(()=> window.location.href="index.html",800); // redirección
}

// ================= ELEMENTOS =================
const contenedor = document.getElementById("contenedorMascotas"); // contenedor cards
const contador = document.getElementById("contadorNoti"); // badge
const campana = document.getElementById("campana"); // icono campana

let mascotaSeleccionada = null; // guardamos id seleccionada

// ================= NOTIFICACIONES =================
async function cargarNotificaciones() {

    try {

        const res = await fetch("/api/notificaciones", { // petición
            headers:{ Authorization:"Bearer "+token } // auth
        });

        const data = await res.json(); // parse JSON

        const noLeidas = (data.data || []).filter(n => !n.leido); // filtramos

        if (noLeidas.length > 0) { // si hay

            contador.style.display = "inline-block"; // mostramos badge
            contador.textContent = noLeidas.length; // cantidad
            campana.classList.add("campana-activa"); // animación

        } else {

            contador.style.display = "none"; // ocultamos
            campana.classList.remove("campana-activa"); // quitamos animación
        }

    } catch (error) {

        console.error(error); // debug silencioso
    }
}

// ================= REDIRECCIÓN =================
function irNotificaciones() {
    window.location.href = "notificaciones.html"; // navegación
}

// ================= CARGAR MASCOTAS =================
async function cargarMascotas() {

    try {

        const res = await fetch("/api/mascotas"); // GET mascotas
        const data = await res.json(); // parse

        contenedor.innerHTML = ""; // limpiar

        const mascotas = data.data || []; // fallback

        if (!mascotas.length) { // si vacío
            contenedor.innerHTML = "<p>No hay mascotas disponibles 🐾</p>";
            return;
        }

        mascotas.forEach(m => { // recorrer

            const div = document.createElement("div"); // crear columna
            div.className = "col-md-4 mb-4"; // bootstrap

            div.innerHTML = `
                <div class="card p-3 text-white">

                    <h5>${m.nombre}</h5> <!-- nombre -->

                    <p>${m.descripcion || "Sin descripción"}</p> <!-- descripción -->

                    <button class="btn btn-success w-100"
                        onclick="abrirFormulario(${m.id})">
                        Adoptar
                    </button>

                </div>
            `;

            contenedor.appendChild(div); // insertar
        });

    } catch (error) {

        console.error(error); // debug
        mostrarMensaje("Error cargando mascotas", "danger"); // UX
    }
}

// ================= MODAL =================
function abrirFormulario(id) {

    mascotaSeleccionada = id; // guardamos id

    new bootstrap.Modal( // abrimos modal
        document.getElementById("modalAdopcion")
    ).show();
}

// ================= ENVIAR SOLICITUD =================
async function enviarSolicitud() {

    try {

        const mensaje = ` 
Edad: ${edad.value}
Experiencia: ${experiencia.value}
Espacio: ${espacio.value}
        `; // armamos mensaje

        const res = await fetch("/api/solicitudes", {
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                Authorization:"Bearer "+token
            },
            body: JSON.stringify({
                mascotaId: mascotaSeleccionada,
                mensaje
            })
        });

        const data = await res.json(); // parse

        if (!res.ok) throw new Error(data.message); // error backend

        mostrarMensaje("Postulación enviada 🐾", "success"); // feedback

        setTimeout(()=> location.reload(), 800); // recarga

    } catch (error) {

        console.error(error); // debug
        mostrarMensaje(error.message, "danger"); // UX
    }
}

// ================= INIT =================
cargarMascotas(); // carga inicial
cargarNotificaciones(); // carga campana

</script>

</body>
</html>
