<!DOCTYPE html>
<html lang="es">

<head>

<!-- ===================== META ===================== -->
<meta charset="UTF-8"> <!-- Codificación -->
<meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsive -->

<title>🔔 Notificaciones</title>

<!-- ===================== BOOTSTRAP ===================== -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- ===================== ESTILOS ===================== -->
<style>

/* Overlay oscuro global */
body::before {
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    z-index:-1;
}

/* Tarjetas estilo glass */
.card {
    border-radius:16px;
    backdrop-filter:blur(10px);
    background:rgba(255,255,255,0.15);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 15px 30px rgba(0,0,0,0.4);
}

</style>

</head>

<body class="p-4 text-white" style="background:url('img/Huellitas_de_Amor.jpg') center/cover fixed;">

<div class="container">

    <!-- ===================== HEADER ===================== -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <h3>🔔 Notificaciones</h3>

        <div>
            <!-- Volver -->
            <a href="mascotas.html" class="btn btn-light btn-sm me-2">
                ← Volver
            </a>

            <!-- Logout -->
            <button class="btn btn-danger btn-sm" onclick="logout()">
                Cerrar sesión
            </button>
        </div>

    </div>

    <!-- ===================== LISTA ===================== -->
    <div id="lista"></div>

</div>

<script src="js/utils.js"></script>
<script src="js/auth.js"></script>

<script>

// ===================== TOKEN =====================
const token = localStorage.getItem("token"); // obtenemos token

// ===================== VALIDACIÓN =====================
if (!token) {
    mostrarMensaje("Debes iniciar sesión", "danger"); // aviso UX
    setTimeout(() => window.location.href = "index.html", 800); // redirección
}

// ===================== CONTENEDOR =====================
const lista = document.getElementById("lista"); // contenedor HTML

// ===================== CARGAR NOTIFICACIONES =====================
async function cargar() {

    try {

        // ---------- MARCAR COMO LEÍDAS ----------
        await fetch("/api/notificaciones/leer", {
            method:"PUT",
            headers:{ Authorization:"Bearer "+token }
        });

        // ---------- OBTENER NOTIFICACIONES ----------
        const res = await fetch("/api/notificaciones", {
            headers:{ Authorization:"Bearer "+token }
        });

        const data = await res.json(); // convertimos a JSON

        if (!res.ok) throw new Error(data.message); // manejo error backend

        lista.innerHTML = ""; // limpiamos lista

        const notificaciones = data.data || []; // fallback seguro

        // ---------- SI NO HAY ----------
        if (!notificaciones.length) {
            lista.innerHTML = "<p>No tienes notificaciones 🔕</p>";
            return;
        }

        // ---------- RENDER ----------
        notificaciones.forEach(n => {

            lista.innerHTML += `
                <div class="card p-3 mb-3 text-white">

                    <!-- Mensaje -->
                    <p>${n.mensaje}</p>

                    <!-- Fecha -->
                    <small class="text-light">
                        ${new Date(n.createdAt).toLocaleString()}
                    </small>

                </div>
            `;
        });

    } catch (error) {

        console.error(error); // debug

        mostrarMensaje(error.message, "danger"); // UX
    }
}

// ===================== INIT =====================
cargar(); // ejecutamos al cargar

</script>

</body>
</html>
