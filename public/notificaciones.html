<!DOCTYPE html> <!-- HTML5 -->

<html lang="es"> <!-- idioma -->

<head>

<meta charset="UTF-8"> <!-- caracteres -->
<meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- responsive -->

<title>🔔 Notificaciones</title> <!-- título -->

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* Overlay */
body::before {
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    z-index:-1;
}

/* Card */
.card {
    border-radius:20px;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.2);
    color:white;
}

</style>

</head>

<body class="p-4 text-white" style="background:url('img/Huellitas_Ultra_Premium.png') center/cover fixed;">

<!-- NAVBAR -->
<div id="navbar"></div>

<div class="container">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <h3>🔔 Notificaciones</h3>

        <div>
            <!-- Botón Volver Dinámico -->
            <button class="btn btn-light btn-sm me-2" onclick="volverDashboard()">
                ← Volver
            </button>
            <button class="btn btn-danger btn-sm" onclick="logout()">Cerrar sesión</button>
        </div>

    </div>

    <!-- LISTA -->
    <div id="listaNotificaciones"></div>

</div>

<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/navbar.js"></script>

<script>

// ================= BASE URL =================
// const API_URL = "http://localhost:3000/api"; // Relevado por auth.js

// ================= TOKEN =================
const token = localStorage.getItem("token");

// ================= VALIDACIÓN =================
if (!token) {
    mostrarMensaje("Debes iniciar sesión", "danger");
    setTimeout(()=> window.location.href="index.html",800);
}

// ================= ELEMENTO =================
const lista = document.getElementById("listaNotificaciones");

// ================= CARGAR =================
async function cargarNotificaciones() {

    try {

        const res = await fetch(`${API_URL}/notificaciones`, {
            headers:{ Authorization:"Bearer "+token }
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.message);

        lista.innerHTML = "";

        const notificaciones = data.data || [];

        if (!notificaciones.length) {
            lista.innerHTML = "<p>No tienes notificaciones</p>";
            return;
        }

        notificaciones.forEach(n => {

            lista.innerHTML += `
                <div class="card p-3 mb-3">

                    <p>${n.mensaje}</p>

                    <small>${n.leido ? "Leído" : "No leído"}</small>

                </div>
            `;
        });

    } catch (error) {

        console.error(error);
        mostrarMensaje(error.message, "danger");
    }

    // ================= MARCAR COMO LEÍDAS =================
    try {
        await fetch(`${API_URL}/notificaciones/leer`, {
            method: "PUT",
            headers: { Authorization: "Bearer " + token }
        });
    } catch (e) {
        console.error("Error marcando como leídas", e);
    }
}

// ================= INIT =================
document.addEventListener("DOMContentLoaded", () => {

    cargarNotificaciones();

    if (typeof initNavbar === "function") {
        initNavbar();
    }
});

// ================= VOLVER =================
function volverDashboard() {
    try {
        const usuarioLocal = JSON.parse(localStorage.getItem("user"));
        const userRol = usuarioLocal?.rol?.toLowerCase()?.trim();
        
        if (userRol === "rescatista") return window.location.href = "rescatista.html";
        if (userRol === "admin") return window.location.href = "admin.html";
        return window.location.href = "mascotas.html"; // Por defecto adoptante
    } catch {
        window.history.back(); // Fallback de seguridad
    }
}
window.volverDashboard = volverDashboard;

</script>

</body>
</html>
