<!DOCTYPE html> <!-- HTML5 -->

<html lang="es"> <!-- idioma -->

<head>

<meta charset="UTF-8"> <!-- caracteres -->
<meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- responsive -->

<title>🐾 Panel Rescatista</title> <!-- título -->

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Fuente -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* Fondo */
body {
    font-family:'Poppins', sans-serif; /* fuente */
    background:url("img/Huellitas_de_Amor.jpg") center/cover fixed; /* fondo */
    min-height:100vh; /* altura */
    color:white; /* texto */
}

/* Overlay */
body::before {
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    z-index:-1;
}

/* Contenedor principal */
.container-box {
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(12px);
    border-radius:25px;
    padding:25px;
    box-shadow:0 25px 50px rgba(0,0,0,0.4);
}

/* Header */
.top-bar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

/* Cards */
.card {
    border-radius:20px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

/* Imagen */
.card img {
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:12px;
    margin-bottom:10px;
}

</style>

</head>

<body class="p-4">

<div class="container">

    <div class="container-box">

        <!-- HEADER -->
        <div class="top-bar">

            <h3>🐾 Mis Mascotas</h3>

            <div>

                <!-- crear -->
                <a href="crear-mascota.html" class="btn btn-success me-2">
                    ➕ Crear Mascota
                </a>

                <!-- logout -->
                <button onclick="logout()" class="btn btn-danger">
                    Cerrar sesión
                </button>

            </div>

        </div>

        <!-- LISTA -->
        <div id="contenedorMascotas" class="row"></div>

    </div>

</div>

<script src="js/utils.js"></script>
<script src="js/auth.js"></script>

<script>

// ================= TOKEN =================
const token = localStorage.getItem("token");

// ================= USER =================
let user = null;

try {
    user = JSON.parse(localStorage.getItem("user"));
} catch {
    user = null;
}

// ================= ROL =================
const rol = user?.rol?.toLowerCase()?.trim();

// ================= PROTECCIÓN =================
if (!token || !user || rol !== "rescatista") {
    window.location.href = "index.html";
}

// ================= CARGAR MASCOTAS =================
async function cargarMascotas() {

    const contenedor = document.getElementById("contenedorMascotas");

    try {

        const res = await fetch("/api/mascotas", {
            headers:{ Authorization:"Bearer "+token }
        });

        const data = await res.json();

        const mascotas = (data.data || []).filter(m => m.userId === user.id);

        contenedor.innerHTML = "";

        if (!mascotas.length) {
            contenedor.innerHTML = "<p>No tienes mascotas aún 🐶</p>";
            return;
        }

        mascotas.forEach(m => {

            const imagen = m.imagen 
                ? `/uploads/${m.imagen}` 
                : "img/default.jpg";

            contenedor.innerHTML += `
                <div class="col-md-4">
                    <div class="card p-3 text-white mb-3">

                        <img src="${imagen}" alt="mascota">

                        <h5>${m.nombre}</h5>

                        <p><strong>Raza:</strong> ${m.raza || "No definida"}</p>

                        <p><strong>Edad:</strong> ${m.edad}</p>

                        <p><strong>${m.estado}</strong></p>

                        <button 
                            onclick="verPostulantes(${m.id})"
                            class="btn btn-primary mt-2">
                            Ver postulantes
                        </button>

                    </div>
                </div>
            `;
        });

    } catch (error) {

        console.error(error);
        mostrarMensaje("Error cargando mascotas", "danger");
    }
}

// ================= REDIRECCIÓN =================
function verPostulantes(id) {
    window.location.href = "postulantes.html?id=" + id;
}

// ================= INIT =================
cargarMascotas();

</script>

</body>
</html>
