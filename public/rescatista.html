<!DOCTYPE html> <!-- HTML5 -->

<html lang="es"> <!-- Idioma -->

<head>

    <!-- Codificación -->
    <meta charset="UTF-8">

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título -->
    <title>🐾 Mis Mascotas</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>

        /* -------------------------------------------------- */
        /* FONDO GLOBAL */
        /* -------------------------------------------------- */

        body {

            font-family: 'Poppins', sans-serif;

            background-image: url("img/Huellitas_de_Amor.jpg");

            background-size: cover;

            background-attachment: fixed;

            padding: 20px;
        }

        /* OVERLAY */
        body::before {

            content: "";

            position: fixed;

            inset: 0;

            background: linear-gradient(
                rgba(0,0,0,0.65),
                rgba(0,0,0,0.45)
            );

            z-index: -1;
        }

        /* HEADER */
        .header {

            display: flex;

            justify-content: space-between;

            align-items: center;

            margin-bottom: 20px;

            color: white;
        }

        /* CARD */
        .card {

            border-radius: 20px;

            padding: 20px;

            margin-bottom: 15px;

            background: rgba(255,255,255,0.15);

            backdrop-filter: blur(12px);

            border: 1px solid rgba(255,255,255,0.2);

            color: white;
        }

        /* SUB TARJETAS */
        .mini {

            background: rgba(255,255,255,0.1);

            padding: 10px;

            border-radius: 10px;

            margin-top: 10px;
        }

        /* BOTONES */
        .btn {

            border-radius: 10px;
        }

    </style>

</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">

        <h3>🐶 Mis Mascotas</h3>

        <div>

            <!-- CREAR -->
            <a href="crear-mascota.html" class="btn btn-success btn-sm me-2">
                + Nueva mascota
            </a>

            <!-- LOGOUT -->
            <button class="btn btn-danger btn-sm" onclick="logout()">
                Cerrar sesión
            </button>

        </div>

    </div>

    <!-- CONTENEDOR -->
    <div id="contenedorMascotas"></div>

</div>

<!-- SCRIPTS -->
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>

<script>

    // --------------------------------------------------
    // VARIABLES
    // --------------------------------------------------

    const token = localStorage.getItem("token"); // token

    const user = JSON.parse(localStorage.getItem("user")) || {}; // usuario


    // --------------------------------------------------
    // PROTECCIÓN
    // --------------------------------------------------

    if (!user || user.rol !== "rescatista") {

        mostrarMensaje("Acceso solo rescatista", "danger");

        window.location.href = "mascotas.html";
    }


    // --------------------------------------------------
    // CARGAR MASCOTAS
    // --------------------------------------------------

    async function cargarMisMascotas() {

        try {

            const res = await fetch("/api/mascotas", {
                headers: {
                    Authorization: "Bearer " + token
                }
            });

            const data = await res.json();

            const mascotas = data.data || [];

            // Filtrar solo las del usuario
            const misMascotas = mascotas.filter(m => m.userId === user.id);

            mostrarMascotas(misMascotas);

        } catch (error) {

            console.error(error);

            mostrarMensaje("Error al cargar mascotas", "danger");
        }
    }


    // --------------------------------------------------
    // MOSTRAR MASCOTAS
    // --------------------------------------------------

    function mostrarMascotas(lista) {

        const cont = document.getElementById("contenedorMascotas");

        cont.innerHTML = "";

        if (!lista.length) {

            cont.innerHTML = "<p class='text-white'>No tienes mascotas</p>";

            return;
        }

        lista.forEach(m => {

            cont.innerHTML += `
                <div class="card">

                    <h4>${m.nombre} 🐶</h4>

                    <p>${m.descripcion}</p>

                    <!-- BOTÓN -->
                    <button 
                        onclick="verSolicitudes(${m.id})"
                        class="btn btn-primary btn-sm"
                    >
                        Ver solicitudes
                    </button>

                    <!-- CONTENEDOR DINÁMICO -->
                    <div id="solicitudes-${m.id}"></div>

                </div>
            `;
        });
    }


    // --------------------------------------------------
    // VER SOLICITUDES
    // --------------------------------------------------

    async function verSolicitudes(id) {

        try {

            const res = await fetch(`/api/solicitudes/mascota/${id}`, {
                headers: {
                    Authorization: "Bearer " + token
                }
            });

            const data = await res.json();

            const solicitudes = data.data || [];

            const cont = document.getElementById(`solicitudes-${id}`);

            if (!solicitudes.length) {

                cont.innerHTML = "<p>No hay solicitudes</p>";

                return;
            }

            cont.innerHTML = "";

            solicitudes.forEach(s => {

                cont.innerHTML += `
                    <div class="mini">

                        <strong>${s.adoptante.nombre}</strong><br>

                        <small>${s.adoptante.email}</small>

                        <p>${s.mensaje || ""}</p>

                        <button 
                            class="btn btn-success btn-sm"
                            onclick="elegir(${s.id})"
                        >
                            Seleccionar ✅
                        </button>

                    </div>
                `;
            });

        } catch (error) {

            console.error(error);

            mostrarMensaje("Error al cargar solicitudes", "danger");
        }
    }


    // --------------------------------------------------
    // ELEGIR ADOPTANTE
    // --------------------------------------------------

    async function elegir(id) {

        try {

            const res = await fetch(`/api/solicitudes/seleccionar/${id}`, {

                method: "PUT",

                headers: {
                    Authorization: "Bearer " + token
                }
            });

            const data = await res.json();

            if (!res.ok) {

                mostrarMensaje(data.message || "Error", "danger");

                return;
            }

            mostrarMensaje("Adopción completada 🎉");

            location.reload();

        } catch (error) {

            console.error(error);

            mostrarMensaje("Error al seleccionar", "danger");
        }
    }


    // --------------------------------------------------
    // INICIO
    // --------------------------------------------------

    cargarMisMascotas();

</script>

</body>
</html>
