<!DOCTYPE html> <!-- Documento HTML5 -->
<html lang="es"> <!-- Idioma -->

<head>

<meta charset="UTF-8"> <!-- Codificación -->
<title>Panel Rescatista</title> <!-- Título -->

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Fuente -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* -------------------------------------------------- */
/* FONDO GLOBAL CONSISTENTE */
/* -------------------------------------------------- */

body {
    font-family: 'Poppins', sans-serif; /* Fuente */
    background-image: url("img/Huellitas_de_Amor.jpg"); /* Imagen fondo */
    background-size: cover; /* Ajuste */
    background-attachment: fixed; /* Fijo */
    min-height: 100vh; /* Altura */
    color: white; /* Texto */
}

/* Overlay oscuro */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.5));
    z-index: -1;
}

/* -------------------------------------------------- */
/* CONTENEDOR PRINCIPAL */
/* -------------------------------------------------- */

.container-box {
    background: rgba(255,255,255,0.15); /* glass */
    backdrop-filter: blur(15px); /* blur */
    border-radius: 25px; /* bordes */
    padding: 25px; /* espacio */
    box-shadow: 0 25px 50px rgba(0,0,0,0.4); /* sombra */
}

/* -------------------------------------------------- */
/* HEADER */
/* -------------------------------------------------- */

.top-bar {
    display: flex; /* flex */
    justify-content: space-between; /* separación */
    align-items: center; /* centrado */
    margin-bottom: 20px; /* espacio */
}

/* -------------------------------------------------- */
/* TARJETAS */
/* -------------------------------------------------- */

.card {
    border-radius: 20px; /* bordes */
    background: rgba(255,255,255,0.15); /* glass */
    backdrop-filter: blur(12px); /* blur */
    border: 1px solid rgba(255,255,255,0.2); /* borde */
    box-shadow: 0 15px 40px rgba(0,0,0,0.3); /* sombra */
    transition: 0.3s;
}

/* Hover */
.card:hover {
    transform: translateY(-5px);
}

/* Imagen */
.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 12px;
    margin-bottom: 10px;
}

</style>

</head>

<body class="p-4">

<div class="container">

    <div class="container-box">

        <!-- HEADER -->
        <div class="top-bar">

            <h3>🐾 Mis Mascotas</h3>

            <div>

                <!-- Crear -->
                <a href="crear-mascota.html" class="btn btn-success me-2">
                    ➕ Crear Mascota
                </a>

                <!-- Logout -->
                <button onclick="logout()" class="btn btn-danger">
                    Cerrar sesión
                </button>

            </div>

        </div>

        <!-- CONTENEDOR -->
        <div id="contenedorMascotas" class="row"></div>

    </div>

</div>

<script src="js/utils.js"></script>
<script src="js/auth.js"></script>

<script>

// --------------------------------------------------
// TOKEN
// --------------------------------------------------

const token = localStorage.getItem("token"); // obtenemos token

// --------------------------------------------------
// USER
// --------------------------------------------------

let user = null; // inicializamos

try {
    user = JSON.parse(localStorage.getItem("user")); // parse seguro
} catch {
    user = null; // fallback
}

// --------------------------------------------------
// ROL
// --------------------------------------------------

const rol = user?.rol?.toLowerCase()?.trim(); // normalizamos

// --------------------------------------------------
// PROTECCIÓN
// --------------------------------------------------

if (!token || !user || rol !== "rescatista") {
    window.location.href = "index.html"; // redirige si no cumple
}

// --------------------------------------------------
// CARGAR MASCOTAS
// --------------------------------------------------

async function cargarMascotas() {

    const contenedor = document.getElementById("contenedorMascotas");

    try {

        const res = await fetch("/api/mascotas", {
            headers: {
                Authorization: "Bearer " + token
            }
        });

        const data = await res.json();

        // Filtramos solo las del usuario
        const mascotas = (data.data || []).filter(m => m.userId === user.id);

        contenedor.innerHTML = "";

        if (!mascotas.length) {
            contenedor.innerHTML = "<p>No tienes mascotas aún 🐶</p>";
            return;
        }

        mascotas.forEach(m => {

            // 🔥 imagen correcta
            const imagen = m.imagen 
                ? `/uploads/${m.imagen}` 
                : "img/default.jpg";

            contenedor.innerHTML += `
                <div class="col-md-4">
                    <div class="card p-3 text-white mb-3">

                        <!-- Imagen -->
                        <img src="${imagen}" alt="mascota">

                        <!-- Nombre -->
                        <h5>${m.nombre}</h5>

                        <!-- Raza -->
                        <p><strong>Raza:</strong> ${m.raza || "No definida"}</p>

                        <!-- Edad -->
                        <p><strong>Edad:</strong> ${m.edad}</p>

                        <!-- Estado -->
                        <p><strong>${m.estado}</strong></p>

                        <!-- Botón -->
                        <button onclick="verPostulantes(${m.id})" class="btn btn-primary mt-2">
                            Ver postulantes
                        </button>

                    </div>
                </div>
            `;
        });

    } catch (error) {

        console.error("Error cargando mascotas:", error);
    }
}

// --------------------------------------------------
// REDIRECCIÓN
// --------------------------------------------------

function verPostulantes(id) {
    window.location.href = "postulantes.html?id=" + id;
}

// --------------------------------------------------
// INIT
// --------------------------------------------------

cargarMascotas();

</script>

</body>
</html>
