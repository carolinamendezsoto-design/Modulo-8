<!DOCTYPE html> <!-- HTML5 -->

<html lang="es"> <!-- idioma -->

<head>

<meta charset="UTF-8"> <!-- caracteres -->
<meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- responsive -->

<title>🐾 Panel Rescatista</title> <!-- título -->

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Fuente -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* Fondo */
body {
    font-family:'Poppins', sans-serif; /* fuente */
    background:url("img/Huellitas_Ultra_Premium.png") center/cover fixed; /* fondo */
    min-height:100vh; /* altura */
    color:white; /* texto */
}

/* Overlay */
body::before {
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    z-index:-1;
}

/* Contenedor principal */
.container-box {
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(12px);
    border-radius:25px;
    padding:25px;
    box-shadow:0 25px 50px rgba(0,0,0,0.4);
}

/* Header */
.top-bar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

/* Cards */
.card {
    border-radius:20px;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

/* Imagen */
.card img {
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:12px;
    margin-bottom:10px;
}

/* Animación y campana */
@keyframes vibrar {
    0%{transform:rotate(0);}
    25%{transform:rotate(-10deg);}
    50%{transform:rotate(10deg);}
    75%{transform:rotate(-6deg);}
    100%{transform:rotate(0);}
}
.campana-activa {
    animation:vibrar 0.6s infinite;
}

</style>

</head>

<body class="p-4">

<div class="container">

    <div class="container-box">

        <!-- HEADER -->
        <div class="top-bar">

            <h3>🐾 Mis Mascotas</h3>

            <div class="d-flex align-items-center">

                <!-- NOMBRE USUARIO -->
                <span id="nombreUsuario" class="me-3 fw-bold"></span>

                <!-- CAMPANA DE NOTIFICACIONES -->
                <div id="campana" class="me-3" style="position:relative; cursor:pointer;" onclick="irNotificaciones()">
                    <span style="font-size:26px;">🔔</span>
                    <span id="contadorNoti" class="badge bg-danger" style="position:absolute; top:-8px; right:-10px; display:none;"></span>
                </div>

                <!-- crear -->
                <a href="crear-mascota.html" class="btn btn-success me-2">
                    ➕ Crear Mascota
                </a>

                <!-- logout -->
                <button onclick="logout()" class="btn btn-danger">
                    Cerrar sesión
                </button>

            </div>

        </div>

        <!-- LISTA -->
        <div id="contenedorMascotas" class="row"></div>

    </div>

</div>

<script src="js/utils.js"></script>
<script src="js/auth.js"></script> <!-- script de autenticación -->
<script src="js/rescatista.js"></script> <!-- script principal de configuración visual para rescatistas -->

</body>
</html>
