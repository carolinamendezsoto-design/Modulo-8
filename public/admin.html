<!DOCTYPE html> <!-- Declaramos HTML5 -->

<html lang="es"> <!-- Idioma español -->

<head>

<!-- ================= META ================= -->

<meta charset="UTF-8"> <!-- Permite caracteres especiales -->
<meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsive -->

<title>🐾 Panel Admin</title> <!-- Título pestaña -->

<!-- ================= LIBRERÍAS ================= -->

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> <!-- Bootstrap CSS -->

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"> <!-- Fuente -->

<!-- ================= ESTILOS ================= -->

<style>

/* Fuente global y fondo */
body {
    font-family:'Poppins', sans-serif; /* tipografía */
    background:url("img/Huellitas_Ultra_Premium.png") center/cover fixed; /* imagen fondo */
    min-height:100vh; /* asegura altura completa */
}

/* Overlay oscuro para contraste */
body::before {
    content:""; /* obligatorio */
    position:fixed; /* ocupa pantalla */
    inset:0; /* full */
    background:rgba(0,0,0,0.6); /* oscurece */
    z-index:-1; /* detrás */
}

/* Header superior */
.header {
    display:flex; /* flexbox */
    justify-content:space-between; /* separación */
    align-items:center; /* centrado vertical */
    margin-bottom:30px; /* espacio abajo */
    color:white; /* texto blanco */
}

/* Contenedor grid responsive */
.grid {
    display:grid; /* grid layout */
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); /* responsive */
    gap:25px; /* espacio entre cards */
}

/* Tarjetas glass */
.card {
    border-radius:20px; /* bordes */
    padding:25px; /* espacio interno */
    text-align:center; /* centrado */
    background:rgba(0,0,0,0.6); /* dark transparency */
    backdrop-filter:blur(12px); /* efecto glass */
    border:1px solid rgba(255,255,255,0.2); /* borde */
    color:white; /* texto */
    box-shadow:0 15px 40px rgba(0,0,0,0.4); /* sombra */
    transition:0.3s; /* animación suave */
}

/* Hover tarjeta */
.card:hover {
    transform:translateY(-8px) scale(1.03); /* elevación */
}

/* Iconos grandes */
.icon {
    font-size:40px; /* tamaño */
    margin-bottom:10px; /* separación */
}

/* Botones */
.btn {
    border-radius:10px; /* bordes suaves */
}

/* Animación de campana */
@keyframes vibrar {
    0%{transform:rotate(0);}
    25%{transform:rotate(-10deg);}
    50%{transform:rotate(10deg);}
    75%{transform:rotate(-6deg);}
    100%{transform:rotate(0);}
}
.campana-activa {
    animation:vibrar 0.6s infinite;
}

</style>

</head>

<!-- ================= BODY ================= -->

<body class="p-4"> <!-- padding global -->

<div class="container"> <!-- contenedor bootstrap -->

    <!-- ================= HEADER ================= -->
    <div class="header">

        <h2>🐾 Panel Administrador</h2> <!-- título -->

        <div class="d-flex align-items-center">

            <!-- CAMPANA DE NOTIFICACIONES -->
            <div id="campana" class="me-3" style="position:relative; cursor:pointer;" onclick="irNotificaciones()">
                <span style="font-size:26px;">🔔</span>
                <span id="contadorNoti" class="badge bg-danger" style="position:absolute; top:-8px; right:-10px; display:none;"></span>
            </div>

            <!-- Nombre dinámico -->
            <span id="nombreAdmin" class="me-3 fw-bold"></span> <!-- se llena con JS -->

            <!-- Botón logout -->
            <button class="btn btn-danger btn-sm" onclick="logout()">
                Cerrar sesión
            </button>

        </div>

    </div>

    <!-- ================= DASHBOARD ESTADÍSTICAS ================= -->
    <div class="row text-center mb-4" id="adminStats" style="display:none;">
        <div class="col-md-6 mb-3">
            <div class="card p-3 shadow-lg" style="background: rgba(46, 204, 113, 0.15); border-color: #2ecc71;">
                <h2 id="countUsers" class="m-0 text-success fw-bold spinner-border spinner-border-sm text-success mx-auto"></h2>
                <small class="text-white mt-1">Total Usuarios Registrados</small>
            </div>
        </div>
        <div class="col-md-6 mb-3">
            <div class="card p-3 shadow-lg" style="background: rgba(52, 152, 219, 0.15); border-color: #3498db;">
                <h2 id="countPets" class="m-0 text-info fw-bold spinner-border spinner-border-sm text-info mx-auto"></h2>
                <small class="text-white mt-1">Total Mascotas en Sistema</small>
            </div>
        </div>
    </div>

    <!-- ================= ÚLTIMOS REGISTROS ================= -->
    <div class="card mb-4 text-start" id="ultimosUsuariosCard" style="display:none; padding-bottom: 5px;">
        <h5 class="text-white mb-3 border-bottom border-light pb-2">Nuevos Usuarios (Actividad Reciente)</h5>
        <div id="ultimosUsuariosList">
            <!-- Cargando por JS... -->
        </div>
    </div>

    <!-- ================= GRID ACCESOS DIRECTOS ================= -->
    <div class="grid">

        <!-- CARD USUARIOS -->
        <div class="card">

            <div class="icon">👥</div> <!-- icono -->

            <h4>Usuarios</h4> <!-- título -->

            <p>Gestiona usuarios del sistema</p> <!-- descripción -->

            <a href="usuarios.html" class="btn btn-primary w-100">
                Ir
            </a>

        </div>

        <!-- CARD MASCOTAS -->
        <div class="card">

            <div class="icon">🐶</div>

            <h4>Mascotas</h4>

            <p>Explorar mascotas disponibles</p>

            <a href="mascotas.html" class="btn btn-success w-100">
                Ir
            </a>

        </div>

        <!-- CARD SOLICITUDES -->
        <div class="card">

            <div class="icon">💌</div>

            <h4>Solicitudes</h4>

            <p>Gestionar adopciones</p>

            <a href="postulantes.html" class="btn btn-warning w-100">
                Ir
            </a>

        </div>

    </div>

</div>

<!-- ================= SCRIPTS ================= -->

<script src="js/utils.js"></script> <!-- utilidades y mensajes -->
<script src="js/auth.js"></script> <!-- manejador de sesiones y cierre de sesión -->
<script src="js/admin.js"></script> <!-- la lógica completa programada para este panel administrativo -->

</body>
</html>
