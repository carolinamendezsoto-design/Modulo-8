<!DOCTYPE html> <!-- HTML5 -->

<html lang="es"> <!-- Idioma -->

<head>

    <!-- Codificación -->
    <meta charset="UTF-8">

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título -->
    <title>🐾 Panel Admin</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>

        /* -------------------------------------------------- */
        /* FONDO GLOBAL */
        /* -------------------------------------------------- */

        body {

            font-family: 'Poppins', sans-serif;

            background-image: url("img/Huellitas_de_Amor.jpg");

            background-size: cover;

            background-attachment: fixed;

            padding: 30px;

            position: relative;
        }

        /* OVERLAY */
        body::before {

            content: "";

            position: fixed;

            inset: 0;

            background: linear-gradient(
                rgba(0,0,0,0.5),
                rgba(0,0,0,0.3)
            );

            z-index: -1;
        }

        /* HEADER */
        .header {

            display: flex;

            justify-content: space-between;

            align-items: center;

            margin-bottom: 30px;

            color: white;
        }

        /* GRID */
        .grid {

            display: grid;

            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));

            gap: 20px;
        }

        /* CARD */
        .card {

            border-radius: 25px;

            padding: 25px;

            text-align: center;

            background: rgba(255,255,255,0.15);

            backdrop-filter: blur(12px);

            border: 1px solid rgba(255,255,255,0.2);

            color: white;

            box-shadow: 0 15px 40px rgba(0,0,0,0.3);

            transition: 0.3s;

            animation: fadeIn 0.6s ease forwards;
        }

        /* HOVER */
        .card:hover {

            transform: translateY(-8px) scale(1.03);
        }

        /* ICONO */
        .icon {

            font-size: 40px;

            margin-bottom: 10px;
        }

        /* BOTONES */
        .btn {

            border-radius: 12px;
        }

        /* ANIMACIÓN */
        @keyframes fadeIn {

            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

    </style>

</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">

        <h2>🐾 Panel Administrador</h2>

        <!-- LOGOUT -->
        <button class="btn btn-danger" onclick="logout()">
            Cerrar sesión
        </button>

    </div>

    <!-- DASHBOARD -->
    <div class="grid">

        <!-- USUARIOS -->
        <div class="card">

            <div class="icon">👥</div>

            <h4>Usuarios</h4>

            <p>Gestiona todos los usuarios</p>

            <a href="usuarios.html" class="btn btn-primary">
                Ir a usuarios
            </a>

        </div>

        <!-- MASCOTAS -->
        <div class="card">

            <div class="icon">🐶</div>

            <h4>Mascotas</h4>

            <p>Ver todas las mascotas</p>

            <a href="mascotas.html" class="btn btn-success">
                Ir a mascotas
            </a>

        </div>

        <!-- SOLICITUDES -->
        <div class="card">

            <div class="icon">💌</div>

            <h4>Solicitudes</h4>

            <p>Revisar adopciones</p>

            <a href="postulantes.html" class="btn btn-warning">
                Ver solicitudes
            </a>

        </div>

    </div>

</div>

<!-- SCRIPTS -->
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>

<script>

    // --------------------------------------------------
    // PROTECCIÓN ADMIN (MEJORADA)
    // --------------------------------------------------

    // Obtenemos usuario desde localStorage
    const user = JSON.parse(localStorage.getItem("user"));

    // Validamos acceso
    if (!user || user.rol !== "admin") {

        // Mensaje visual (mejor que alert)
        mostrarMensaje("Acceso solo admin", "danger");

        // Redirigimos
        window.location.href = "index.html";
    }

</script>

</body>
</html>
