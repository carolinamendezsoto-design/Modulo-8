<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🐾 Panel Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* FUENTE Y FONDO */
body {
    font-family: 'Poppins', sans-serif;
    background-image: url("img/Huellitas_de_Amor.jpg");
    background-size: cover;
    background-attachment: fixed;
    padding: 30px;
}

/* OVERLAY OSCURO */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: linear-gradient(
        rgba(0,0,0,0.6),
        rgba(0,0,0,0.4)
    );
    z-index: -1;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    color: white;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 25px;
}

/* CARD GLASS */
.card {
    border-radius: 20px;
    padding: 25px;
    text-align: center;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    transition: 0.3s;
}

/* HOVER */
.card:hover {
    transform: translateY(-8px) scale(1.02);
}

/* ICONOS */
.icon {
    font-size: 38px;
    margin-bottom: 10px;
}

/* BOTONES */
.btn {
    border-radius: 10px;
}

</style>

</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">

        <h2>🐾 Panel Administrador</h2>

        <div>

            <!-- Nombre admin -->
            <span id="nombreAdmin" class="me-3 fw-bold"></span>

            <!-- Logout -->
            <button class="btn btn-danger btn-sm" onclick="logout()">
                Cerrar sesión
            </button>

        </div>

    </div>

    <!-- GRID -->
    <div class="grid">

        <!-- USUARIOS -->
        <div class="card">

            <div class="icon">👥</div>

            <h4>Usuarios</h4>

            <p>Gestiona usuarios</p>

            <a href="usuarios.html" class="btn btn-primary w-100">
                Ir
            </a>

        </div>

        <!-- MASCOTAS -->
        <div class="card">

            <div class="icon">🐶</div>

            <h4>Mascotas</h4>

            <p>Ver mascotas</p>

            <a href="mascotas.html" class="btn btn-success w-100">
                Ir
            </a>

        </div>

        <!-- SOLICITUDES -->
        <div class="card">

            <div class="icon">💌</div>

            <h4>Solicitudes</h4>

            <p>Revisar adopciones</p>

            <a href="postulantes.html" class="btn btn-warning w-100">
                Ir
            </a>

        </div>

    </div>

</div>

<!-- SCRIPTS -->
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>

<script>

// PROTECCIÓN
const token = localStorage.getItem("token");

let user = null;

try {
    user = JSON.parse(localStorage.getItem("user"));
} catch {
    user = null;
}

if (!token || !user || user.rol !== "admin") {

    mostrarMensaje("Acceso solo admin", "danger");

    setTimeout(() => {
        window.location.href = "index.html";
    }, 800);
}

// MOSTRAR NOMBRE
const nombreAdmin = document.getElementById("nombreAdmin");

if (user) {
    nombreAdmin.textContent = "👤 " + (user.nombre || "Admin");
}

</script>

</body>
</html>
