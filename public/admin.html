<!DOCTYPE html> <!-- HTML5 -->

<html lang="es"> <!-- Idioma -->

<head>

    <!-- Codificación -->
    <meta charset="UTF-8">

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título -->
    <title>🐾 Panel Admin</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>

        body {
            font-family: 'Poppins', sans-serif;
            background-image: url("img/Huellitas_de_Amor.jpg");
            background-size: cover;
            background-attachment: fixed;
            padding: 30px;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(
                rgba(0,0,0,0.5),
                rgba(0,0,0,0.3)
            );
            z-index: -1;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            color: white;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            border-radius: 25px;
            padding: 25px;
            text-align: center;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.03);
        }

        .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .btn {
            border-radius: 12px;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="header">

        <h2>🐾 Panel Administrador</h2>

        <button class="btn btn-danger" onclick="logout()">
            Cerrar sesión
        </button>

    </div>

    <div class="grid">

        <div class="card">

            <div class="icon">👥</div>

            <h4>Usuarios</h4>

            <p>Gestiona todos los usuarios</p>

            <a href="usuarios.html" class="btn btn-primary">
                Ir a usuarios
            </a>

        </div>

        <div class="card">

            <div class="icon">🐶</div>

            <h4>Mascotas</h4>

            <p>Ver todas las mascotas</p>

            <a href="mascotas.html" class="btn btn-success">
                Ir a mascotas
            </a>

        </div>

        <div class="card">

            <div class="icon">💌</div>

            <h4>Solicitudes</h4>

            <p>Revisar adopciones</p>

            <a href="postulantes.html" class="btn btn-warning">
                Ver solicitudes
            </a>

        </div>

    </div>

</div>

<script src="js/utils.js"></script>
<script src="js/auth.js"></script>

<script>

    // --------------------------------------------------
    // PROTECCIÓN ADMIN PRO
    // --------------------------------------------------

    const token = localStorage.getItem("token");

    let user = null;

    try {
        user = JSON.parse(localStorage.getItem("user"));
    } catch {
        user = null;
    }

    if (!token || !user || user.rol !== "admin") {

        mostrarMensaje("Acceso solo admin", "danger");

        setTimeout(() => {
            window.location.href = "index.html";
        }, 800);
    }

</script>

</body>
</html>
