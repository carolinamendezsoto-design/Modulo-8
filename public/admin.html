<!DOCTYPE html> <!-- Declaramos HTML5 -->

<html lang="es"> <!-- Idioma español -->

<head>

<!-- ================= META ================= -->

<meta charset="UTF-8"> <!-- Permite caracteres especiales -->
<meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsive -->

<title>🐾 Panel Admin</title> <!-- Título pestaña -->

<!-- ================= LIBRERÍAS ================= -->

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> <!-- Bootstrap CSS -->

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"> <!-- Fuente -->

<!-- ================= ESTILOS ================= -->

<style>

/* Fuente global y fondo */
body {
    font-family:'Poppins', sans-serif; /* tipografía */
    background:url("img/Huellitas_de_Amor.jpg") center/cover fixed; /* imagen fondo */
    min-height:100vh; /* asegura altura completa */
}

/* Overlay oscuro para contraste */
body::before {
    content:""; /* obligatorio */
    position:fixed; /* ocupa pantalla */
    inset:0; /* full */
    background:rgba(0,0,0,0.6); /* oscurece */
    z-index:-1; /* detrás */
}

/* Header superior */
.header {
    display:flex; /* flexbox */
    justify-content:space-between; /* separación */
    align-items:center; /* centrado vertical */
    margin-bottom:30px; /* espacio abajo */
    color:white; /* texto blanco */
}

/* Contenedor grid responsive */
.grid {
    display:grid; /* grid layout */
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); /* responsive */
    gap:25px; /* espacio entre cards */
}

/* Tarjetas glass */
.card {
    border-radius:20px; /* bordes */
    padding:25px; /* espacio interno */
    text-align:center; /* centrado */
    background:rgba(255,255,255,0.15); /* transparencia */
    backdrop-filter:blur(12px); /* efecto glass */
    border:1px solid rgba(255,255,255,0.2); /* borde */
    color:white; /* texto */
    box-shadow:0 15px 40px rgba(0,0,0,0.4); /* sombra */
    transition:0.3s; /* animación suave */
}

/* Hover tarjeta */
.card:hover {
    transform:translateY(-8px) scale(1.03); /* elevación */
}

/* Iconos grandes */
.icon {
    font-size:40px; /* tamaño */
    margin-bottom:10px; /* separación */
}

/* Botones */
.btn {
    border-radius:10px; /* bordes suaves */
}

</style>

</head>

<!-- ================= BODY ================= -->

<body class="p-4"> <!-- padding global -->

<div class="container"> <!-- contenedor bootstrap -->

    <!-- ================= HEADER ================= -->
    <div class="header">

        <h2>🐾 Panel Administrador</h2> <!-- título -->

        <div>

            <!-- Nombre dinámico -->
            <span id="nombreAdmin" class="me-3 fw-bold"></span> <!-- se llena con JS -->

            <!-- Botón logout -->
            <button class="btn btn-danger btn-sm" onclick="logout()">
                Cerrar sesión
            </button>

        </div>

    </div>

    <!-- ================= GRID ================= -->
    <div class="grid">

        <!-- CARD USUARIOS -->
        <div class="card">

            <div class="icon">👥</div> <!-- icono -->

            <h4>Usuarios</h4> <!-- título -->

            <p>Gestiona usuarios del sistema</p> <!-- descripción -->

            <a href="usuarios.html" class="btn btn-primary w-100">
                Ir
            </a>

        </div>

        <!-- CARD MASCOTAS -->
        <div class="card">

            <div class="icon">🐶</div>

            <h4>Mascotas</h4>

            <p>Explorar mascotas disponibles</p>

            <a href="mascotas.html" class="btn btn-success w-100">
                Ir
            </a>

        </div>

        <!-- CARD SOLICITUDES -->
        <div class="card">

            <div class="icon">💌</div>

            <h4>Solicitudes</h4>

            <p>Gestionar adopciones</p>

            <a href="postulantes.html" class="btn btn-warning w-100">
                Ir
            </a>

        </div>

    </div>

</div>

<!-- ================= SCRIPTS ================= -->

<script src="js/utils.js"></script> <!-- funciones UI -->
<script src="js/auth.js"></script> <!-- login / logout -->

<script>

// ================= TOKEN =================
const token = localStorage.getItem("token"); // obtenemos token guardado

// ================= USER =================
let user = null; // inicializamos variable

try {
    user = JSON.parse(localStorage.getItem("user")); // intentamos parsear
} catch {
    user = null; // fallback si falla
}

// ================= NORMALIZACIÓN ROL =================
const rol = user?.rol?.toLowerCase()?.trim(); // aseguramos formato consistente

// ================= PROTECCIÓN =================
if (!token || !user || rol !== "admin") { // validamos acceso

    mostrarMensaje("Acceso solo admin", "danger"); // mensaje UX

    setTimeout(()=> { // delay para que se vea el mensaje
        window.location.href = "index.html"; // redirige
    }, 800);
}

// ================= MOSTRAR NOMBRE =================
const nombreAdmin = document.getElementById("nombreAdmin"); // elemento DOM

if (user) { // si existe usuario

    nombreAdmin.textContent = "👤 " + (user.nombre || "Administrador"); // mostramos nombre
}

// ================= DEBUG OPCIONAL =================
console.log("Usuario logueado:", user); // útil para revisar datos

</script>

</body>
</html>
