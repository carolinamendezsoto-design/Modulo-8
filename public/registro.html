<!DOCTYPE html> <!-- HTML5 -->

<html lang="es"> <!-- Idioma -->

<head>

    <!-- Codificación -->
    <meta charset="UTF-8">

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- TÍTULO -->
    <title>🐾 Huellitas de Amor - Registro</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>

        /* -------------------------------------------------- */
        /* FONDO GLOBAL */
        /* -------------------------------------------------- */

        body {

            font-family: 'Poppins', sans-serif;

            background-image: url("img/Huellitas_de_Amor.jpg");

            background-size: cover;

            background-repeat: no-repeat;

            background-attachment: fixed;

            display: flex;
            align-items: center;
            justify-content: center;

            min-height: 100vh;
        }

        /* -------------------------------------------------- */
        /* OVERLAY OSCURO PRO */
        /* -------------------------------------------------- */

        body::before {

            content: "";

            position: fixed;

            inset: 0;

            background: linear-gradient(
                rgba(0,0,0,0.6),
                rgba(0,0,0,0.4)
            );

            z-index: -1;
        }

        /* -------------------------------------------------- */
        /* TARJETA GLASS */
        /* -------------------------------------------------- */

        .card {

            border-radius: 25px;

            padding: 35px;

            width: 100%;

            max-width: 420px;

            background: rgba(255,255,255,0.15);

            backdrop-filter: blur(15px);

            border: 1px solid rgba(255,255,255,0.2);

            box-shadow: 0 25px 50px rgba(0,0,0,0.4);

            color: white;

            animation: fadeIn 0.6s ease;
        }

        /* ANIMACIÓN */
        @keyframes fadeIn {

            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* -------------------------------------------------- */
        /* TÍTULO */
        /* -------------------------------------------------- */

        .title {

            font-weight: 600;

            text-align: center;

            margin-bottom: 20px;
        }

        /* INPUTS */
        .form-control {

            border-radius: 12px;

            padding: 12px;

            border: none;
        }

        /* SELECT */
        select {
            border-radius: 12px !important;
        }

        /* BOTÓN */
        .btn-success {

            border-radius: 12px;

            border: none;

            background: linear-gradient(135deg, #28a745, #20c997);

            transition: 0.3s;
        }

        .btn-success:hover {

            transform: scale(1.05);
        }

        /* LINK */
        .link {

            text-align: center;

            display: block;

            margin-top: 10px;

            color: #ddd;
        }

        /* 🐶 PERRITO */
        .dog {

            font-size: 35px;

            text-align: center;

            margin-bottom: 10px;

            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {

            0%,100% { transform: translateY(0); }

            50% { transform: translateY(-6px); }
        }

    </style>

</head>

<body>

<!-- -------------------------------------------------- -->
<!-- TARJETA -->
<!-- -------------------------------------------------- -->

<div class="card">

    <!-- 🐶 -->
    <div class="dog">🐶</div>

    <!-- TÍTULO -->
    <h3 class="title">Crear cuenta</h3>

    <!-- NOMBRE -->
    <input type="text" id="nombre" class="form-control mb-3" placeholder="Nombre completo">

    <!-- EMAIL -->
    <input type="email" id="email" class="form-control mb-3" placeholder="Correo electrónico">

    <!-- TELÉFONO -->
    <input type="text" id="telefono" class="form-control mb-3" placeholder="Teléfono">

    <!-- PASSWORD -->
    <input type="password" id="password" class="form-control mb-3" placeholder="Contraseña">

    <!-- ROL -->
    <select id="rol" class="form-control mb-3">

        <option value="">Selecciona tipo de usuario</option>

        <option value="adoptante">Adoptante</option>

        <option value="rescatista">Rescatista</option>

    </select>

    <!-- BOTÓN -->
    <button class="btn btn-success w-100" onclick="crearUsuario()">
        Crear cuenta
    </button>

    <!-- LINK -->
    <a href="index.html" class="link">
        ¿Ya tienes cuenta? Inicia sesión
    </a>

</div>

<!-- SCRIPTS -->
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
