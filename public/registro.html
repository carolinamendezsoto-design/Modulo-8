<!DOCTYPE html> <!-- Indicamos que usamos HTML5 -->

<html lang="es"> <!-- Definimos idioma español -->

<head>

    <!-- Codificación de caracteres (permite tildes, ñ, etc.) -->
    <meta charset="UTF-8">

    <!-- Título de la pestaña -->
    <title>Registro</title>

    <!-- Importamos Bootstrap para estilos rápidos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light"> <!-- Fondo claro -->

<!-- Contenedor principal con margen superior -->
<div class="container mt-5">

    <!-- Tarjeta centrada -->
    <div class="card p-4">

        <!-- Título -->
        <h3>Crear Usuario</h3>

        <!-- Input nombre -->
        <input 
            type="text" 
            id="nombre" 
            class="form-control mb-2" 
            placeholder="Nombre"
        >

        <!-- Input email -->
        <input 
            type="email" 
            id="email" 
            class="form-control mb-2" 
            placeholder="Email"
        >

        <!-- Input contraseña -->
        <input 
            type="password" 
            id="password" 
            class="form-control mb-3" 
            placeholder="Password"
        >

        <!-- Botón crear usuario -->
        <button 
            class="btn btn-success w-100" 
            onclick="crearUsuario()" <!-- Llama función del auth.js -->
        >
            Crear
        </button>

        <!-- Link para volver al login -->
        <a 
            href="index.html" 
            class="d-block mt-3 text-center"
        >
            Volver al login
        </a>

    </div>

</div>

<!-- -------------------------------------------------- -->
<!-- IMPORTANTE: CARGA DE SCRIPTS -->
<!-- -------------------------------------------------- -->

<!-- Función para mostrar mensajes (alertas bonitas) -->
<script src="js/utils.js"></script>

<!-- Funciones de autenticación (crearUsuario, login, etc.) -->
<script src="js/auth.js"></script>

</body>
</html>
