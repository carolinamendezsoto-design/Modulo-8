<!DOCTYPE html> <!-- HTML5 -->

<html lang="es"> <!-- Idioma -->

<head>

    <!-- Codificación -->
    <meta charset="UTF-8">

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título -->
    <title>🐾 Registro</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>

        /* Body */
        body {
            font-family: 'Poppins', sans-serif;
            background-image: url("img/Huellitas_de_Amor.jpg");
            background-size: cover;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Overlay */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(
                rgba(0,0,0,0.6),
                rgba(0,0,0,0.4)
            );
            z-index: -1;
        }

        /* Card */
        .card {
            border-radius: 25px;
            padding: 35px;
            width: 100%;
            max-width: 420px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            color: white;
            animation: fadeIn 0.6s ease;
        }

        /* Animación */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Título */
        .title {
            text-align: center;
            margin-bottom: 20px;
        }

        /* Inputs */
        .form-control {
            border-radius: 12px;
            padding: 12px;
            border: none;
        }

        /* Select */
        select {
            border-radius: 12px !important;
        }

        /* Botón */
        .btn-success {
            border-radius: 12px;
            background: linear-gradient(135deg, #28a745, #20c997);
            border: none;
        }

        .btn-success:hover {
            transform: scale(1.05);
        }

        /* Link */
        .link {
            display: block;
            text-align: center;
            margin-top: 10px;
            color: #ddd;
        }

        /* Icono */
        .dog {
            font-size: 35px;
            text-align: center;
            margin-bottom: 10px;
        }

    </style>

</head>

<body>

<div class="card">

    <!-- Icono -->
    <div class="dog">🐶</div>

    <!-- Título -->
    <h3 class="title">Crear cuenta</h3>

    <!-- Nombre -->
    <input 
        type="text" 
        id="nombre" 
        class="form-control mb-3" 
        placeholder="Nombre completo"
    >

    <!-- Email -->
    <input 
        type="email" 
        id="email" 
        class="form-control mb-3" 
        placeholder="Correo electrónico"
    >

    <!-- Teléfono -->
    <input 
        type="text" 
        id="telefono" 
        class="form-control mb-3" 
        placeholder="Teléfono"
    >

    <!-- Password -->
    <input 
        type="password" 
        id="password" 
        class="form-control mb-3" 
        placeholder="Contraseña"
    >

    <!-- Rol -->
    <select id="rol" class="form-control mb-3">

        <option value="">Selecciona tipo de usuario</option>
        <option value="adoptante">Adoptante</option>
        <option value="rescatista">Rescatista</option>

    </select>

    <!-- Botón -->
    <button 
        class="btn btn-success w-100"
        onclick="handleRegistro()"
    >
        Crear cuenta
    </button>

    <!-- Link -->
    <a href="index.html" class="link">
        ¿Ya tienes cuenta? Inicia sesión
    </a>

</div>

<!-- Scripts -->
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>

<script>

    // --------------------------------------------------
    // REGISTRO MEJORADO
    // --------------------------------------------------

    function handleRegistro() {

        // Obtener valores
        const nombre = document.getElementById("nombre").value.trim();
        const email = document.getElementById("email").value.trim();
        const telefono = document.getElementById("telefono").value.trim();
        const password = document.getElementById("password").value.trim();
        const rol = document.getElementById("rol").value;

        // Validación
        if (!nombre || !email || !telefono || !password || !rol) {
            mostrarMensaje("Completa todos los campos", "warning");
            return;
        }

        // Llamar función del auth.js
        crearUsuario({
            nombre,
            email,
            telefono,
            password,
            rol
        });
    }

</script>

</body>
</html>
