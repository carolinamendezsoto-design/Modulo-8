<!DOCTYPE html> <!-- Declaramos HTML5 -->

<html lang="es"> <!-- Idioma español -->

<head>

<!-- ================= META ================= -->

<meta charset="UTF-8"> <!-- Permite caracteres especiales -->
<meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsive -->

<title>🐾 Registro</title> <!-- Título -->

<!-- ================= LIBRERÍAS ================= -->

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> <!-- Bootstrap -->

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"> <!-- Fuente -->

<!-- ================= ESTILOS ================= -->

<style>

/* Fuente y fondo */
body {
    font-family:'Poppins', sans-serif; /* tipografía */
    background:url("img/Huellitas_Ultra_Premium.png") center/cover fixed; /* fondo */
    display:flex; /* centrado */
    align-items:center; /* vertical */
    justify-content:center; /* horizontal */
    min-height:100vh; /* altura completa */
}

/* Overlay oscuro */
body::before {
    content:""; /* obligatorio */
    position:fixed; /* pantalla completa */
    inset:0; /* top right bottom left */
    background:rgba(0,0,0,0.6); /* oscurece */
    z-index:-1; /* detrás */
}

/* Card */
.card {
    border-radius:25px; /* bordes */
    padding:35px; /* espacio */
    width:100%; /* ancho */
    max-width:420px; /* límite */
    background:rgba(0,0,0,0.6); /* dark glass */
    backdrop-filter:blur(15px); /* blur */
    border:1px solid rgba(255,255,255,0.2); /* borde */
    color:white; /* texto */
    box-shadow:0 25px 50px rgba(0,0,0,0.4); /* sombra */
}

/* Inputs */
.form-control {
    border-radius:12px; /* bordes */
}

/* Botón */
.btn-success {
    border-radius:12px; /* redondeo */
}

/* Link */
.link {
    display:block; /* bloque */
    text-align:center; /* centrado */
    margin-top:10px; /* espacio */
    color:#ddd; /* color */
}

</style>

</head>

<body>

<div class="card"> <!-- contenedor principal -->

    <h3 class="text-center mb-3">Crear cuenta</h3> <!-- título -->

    <!-- INPUT nombre -->
    <input type="text" id="nombre" class="form-control mb-3" placeholder="Nombre completo">

    <!-- INPUT email -->
    <input type="email" id="email" class="form-control mb-3" placeholder="Correo electrónico">

    <!-- INPUT teléfono -->
    <input type="text" id="telefono" class="form-control mb-3" placeholder="Teléfono">

    <!-- INPUT password -->
    <input type="password" id="password" class="form-control mb-3" placeholder="Contraseña">

    <!-- SELECT rol -->
    <select id="rol" class="form-control mb-3">
        <option value="">Selecciona tipo de usuario</option>
        <option value="adoptante">Adoptante</option>
        <option value="rescatista">Rescatista</option>
    </select>

    <!-- BOTÓN -->
    <button class="btn btn-success w-100" onclick="handleRegistro()">
        Crear cuenta
    </button>

    <!-- LINK LOGIN -->
    <a href="index.html" class="link">
        ¿Ya tienes cuenta? Inicia sesión
    </a>

</div>

<!-- ================= SCRIPTS ================= -->

<script src="js/utils.js"></script> <!-- mensajes -->
<script src="js/auth.js"></script> <!-- lógica auth -->

<script>

// ================= REGISTRO =================
function handleRegistro() {

    // obtenemos valores
    const nombreInput = document.getElementById("nombre"); // input nombre
    const emailInput = document.getElementById("email"); // input email
    const telefonoInput = document.getElementById("telefono"); // input teléfono
    const passwordInput = document.getElementById("password"); // input password
    const rolSelect = document.getElementById("rol"); // select rol

    // valores limpios
    const nombre = nombreInput.value.trim(); // quitamos espacios
    const email = emailInput.value.trim();
    const telefono = telefonoInput.value.trim();
    const password = passwordInput.value.trim();
    const rol = rolSelect.value;

    // validación básica
    if (!nombre || !email || !telefono || !password || !rol) {
        mostrarMensaje("Completa todos los campos", "warning"); // UX
        return; // corta ejecución
    }

    // llamada a backend (función externa)
    crearUsuario({
        nombre,
        email,
        telefono,
        password,
        rol
    });
}

</script>

</body>
</html>
