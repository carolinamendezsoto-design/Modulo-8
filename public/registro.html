<!DOCTYPE html> <!-- Definimos que usamos HTML5 -->

<html lang="es"> <!-- Idioma español -->

<head>

    <!-- Codificación de caracteres -->
    <meta charset="UTF-8">

    <!-- Responsive (adaptable a móviles) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título de la pestaña -->
    <title>🐾 Registro</title>

    <!-- Bootstrap (estilos rápidos) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fuente bonita -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>

        /* Fuente general */
        body {
            font-family: 'Poppins', sans-serif;
            background-image: url("img/Huellitas_de_Amor.jpg"); /* fondo */
            background-size: cover; /* cubre toda la pantalla */
            background-attachment: fixed; /* fondo fijo */
            display: flex; /* centrado */
            align-items: center;
            justify-content: center;
            min-height: 100vh; /* alto completo */
        }

        /* Oscurece el fondo (overlay) */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(
                rgba(0,0,0,0.6),
                rgba(0,0,0,0.4)
            );
            z-index: -1;
        }

        /* Tarjeta principal */
        .card {
            border-radius: 25px;
            padding: 35px;
            width: 100%;
            max-width: 420px;
            background: rgba(255,255,255,0.15); /* glassmorphism */
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            color: white;
            animation: fadeIn 0.6s ease;
        }

        /* Animación entrada */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Título */
        .title {
            text-align: center;
            margin-bottom: 20px;
        }

        /* Inputs */
        .form-control {
            border-radius: 12px;
            padding: 12px;
            border: none;
        }

        /* Select */
        select {
            border-radius: 12px !important;
        }

        /* Botón */
        .btn-success {
            border-radius: 12px;
            background: linear-gradient(135deg, #28a745, #20c997);
            border: none;
        }

        .btn-success:hover {
            transform: scale(1.05);
        }

        /* Link */
        .link {
            display: block;
            text-align: center;
            margin-top: 10px;
            color: #ddd;
        }

        /* Icono */
        .dog {
            font-size: 35px;
            text-align: center;
            margin-bottom: 10px;
        }

    </style>

</head>

<body>

<div class="card">

    <!-- Icono -->
    <div class="dog">🐶</div>

    <!-- Título -->
    <h3 class="title">Crear cuenta</h3>

    <!-- INPUT: nombre -->
    <input type="text" id="nombre" class="form-control mb-3" placeholder="Nombre completo">

    <!-- INPUT: email -->
    <input type="email" id="email" class="form-control mb-3" placeholder="Correo electrónico">

    <!-- INPUT: teléfono -->
    <input type="text" id="telefono" class="form-control mb-3" placeholder="Teléfono">

    <!-- INPUT: password -->
    <input type="password" id="password" class="form-control mb-3" placeholder="Contraseña">

    <!-- SELECT: rol -->
    <select id="rol" class="form-control mb-3">
        <option value="">Selecciona tipo de usuario</option>
        <option value="adoptante">Adoptante</option>
        <option value="rescatista">Rescatista</option>
    </select>

    <!-- BOTÓN -->
    <button class="btn btn-success w-100" onclick="handleRegistro()">
        Crear cuenta
    </button>

    <!-- Link login -->
    <a href="index.html" class="link">
        ¿Ya tienes cuenta? Inicia sesión
    </a>

</div>

<!-- Scripts -->
<script src="js/utils.js"></script> <!-- funciones UI -->
<script src="js/auth.js"></script>  <!-- lógica auth -->

<script>

    // --------------------------------------------------
    // FUNCIÓN REGISTRO
    // --------------------------------------------------

    function handleRegistro() {

        // Obtener valores del formulario
        const nombre = document.getElementById("nombre").value.trim();
        const email = document.getElementById("email").value.trim();
        const telefono = document.getElementById("telefono").value.trim();
        const password = document.getElementById("password").value.trim();
        const rol = document.getElementById("rol").value;

        // Validación básica
        if (!nombre || !email || !telefono || !password || !rol) {
            mostrarMensaje("Completa todos los campos", "warning");
            return;
        }

        // Llamamos función del auth.js
        crearUsuario({
            nombre,
            email,
            telefono,
            password,
            rol
        });
    }

</script>

</body>
</html>
