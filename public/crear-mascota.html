<!DOCTYPE html> <!-- Documento HTML5 -->

<html lang="es"> <!-- Idioma -->

<head>

    <meta charset="UTF-8"> <!-- Codificación -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsive -->

    <title>🐾 Crear Mascota</title> <!-- Título -->

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>

        /* ---------------- FONDO ---------------- */
        body {
            font-family: 'Poppins', sans-serif;
            background-image: url("img/Huellitas_de_Amor.jpg");
            background-size: cover;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Overlay */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.5));
            z-index: -1;
        }

        /* Card */
        .card {
            border-radius: 25px;
            padding: 30px;
            max-width: 500px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        /* Inputs */
        .form-control {
            border-radius: 12px;
        }

        /* Imagen preview */
        #preview {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 10px;
            display: none;
        }

    </style>

</head>

<body>

<div class="card">

    <h3 class="text-center mb-3">🐶 Publicar Mascota</h3>

    <form id="formMascota">

        <!-- NOMBRE -->
        <input type="text" id="nombre" class="form-control mb-3" placeholder="Nombre">

        <!-- 🔥 RAZA (NUEVO CAMPO) -->
        <input type="text" id="raza" class="form-control mb-3" placeholder="Raza">

        <!-- EDAD -->
        <div class="row mb-3">

            <div class="col">
                <input type="number" id="edadAnios" class="form-control" placeholder="Años">
            </div>

            <div class="col">
                <input type="number" id="edadMeses" class="form-control" placeholder="Meses">
            </div>

        </div>

        <!-- PORTE -->
        <input type="text" id="porte" class="form-control mb-3" placeholder="Porte">

        <!-- ENERGÍA -->
        <input type="text" id="energia" class="form-control mb-3" placeholder="Energía">

        <!-- DESCRIPCIÓN -->
        <textarea id="descripcion" class="form-control mb-3" placeholder="Descripción"></textarea>

        <!-- PREVIEW -->
        <img id="preview">

        <!-- IMAGEN -->
        <input type="file" id="imagen" class="form-control mb-3">

        <!-- BOTÓN -->
        <button class="btn btn-success w-100 mb-2">Publicar</button>

        <!-- VOLVER -->
        <a href="rescatista.html" class="btn btn-light w-100">Volver</a>

    </form>

</div>

<script src="js/utils.js"></script>
<script src="js/auth.js"></script>

<script>

// TOKEN
const token = localStorage.getItem("token");

// USER
let user = null;

try {
    user = JSON.parse(localStorage.getItem("user"));
} catch {
    user = null;
}

// ROL
const rol = user?.rol?.toLowerCase()?.trim();

// PROTECCIÓN
if (!token || !user || rol !== "rescatista") {
    window.location.href = "index.html";
}

// PREVIEW IMAGEN
document.getElementById("imagen").addEventListener("change", e => {

    const file = e.target.files[0];

    if (!file) return;

    if (!file.type.startsWith("image/")) {
        mostrarMensaje("Debe ser una imagen", "warning");
        return;
    }

    const preview = document.getElementById("preview");

    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
});

// SUBMIT
document.getElementById("formMascota").addEventListener("submit", async e => {

    e.preventDefault();

    const nombre = document.getElementById("nombre").value.trim();
    const raza = document.getElementById("raza").value.trim(); // 🔥 NUEVO
    const anios = document.getElementById("edadAnios").value.trim();
    const meses = document.getElementById("edadMeses").value.trim();
    const porte = document.getElementById("porte").value.trim();
    const energia = document.getElementById("energia").value.trim();
    const descripcion = document.getElementById("descripcion").value.trim();

    // VALIDACIÓN
    if (!nombre || !raza || (!anios && !meses) || !porte || !energia || !descripcion) {
        mostrarMensaje("Completa todos los campos", "warning");
        return;
    }

    // EDAD FORMATEADA
    const edad = `${anios ? anios + " años" : ""} ${meses ? meses + " meses" : ""}`.trim();

    const formData = new FormData();

    formData.append("nombre", nombre);
    formData.append("raza", raza); // 🔥 IMPORTANTE
    formData.append("edad", edad);
    formData.append("porte", porte);
    formData.append("energia", energia);
    formData.append("descripcion", descripcion);

    const file = document.getElementById("imagen").files[0];
    if (file) formData.append("imagen", file);

    try {

        const res = await fetch("/api/mascotas", {
            method: "POST",
            headers: {
                Authorization: "Bearer " + token
            },
            body: formData
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.message);

        mostrarMensaje("Mascota publicada 🐾", "success");

        setTimeout(() => {
            window.location.href = "rescatista.html";
        }, 1200);

    } catch (error) {

        console.error(error);
        mostrarMensaje(error.message, "danger");
    }
});

</script>

</body>
</html>
