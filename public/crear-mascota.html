<!DOCTYPE html> <!-- HTML5 -->

<html lang="es"> <!-- idioma -->

<head>

<meta charset="UTF-8"> <!-- caracteres -->
<meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- responsive -->

<title>🐾 Crear Mascota</title> <!-- título -->

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Fuente -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* Fondo */
body {
    font-family:'Poppins', sans-serif; /* fuente */
    background:url("img/Huellitas_de_Amor.jpg") center/cover fixed; /* fondo */
    display:flex; /* centrado */
    align-items:center;
    justify-content:center;
    min-height:100vh;
}

/* Overlay */
body::before {
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    z-index:-1;
}

/* Card */
.card {
    border-radius:25px;
    padding:30px;
    max-width:500px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.2);
    color:white;
    box-shadow:0 25px 50px rgba(0,0,0,0.4);
}

/* Inputs */
.form-control {
    border-radius:12px;
}

/* Preview */
#preview {
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:15px;
    margin-bottom:10px;
    display:none;
}

</style>

</head>

<body>

<div class="card">

    <h3 class="text-center mb-3">🐶 Publicar Mascota</h3>

    <form id="formMascota">

        <!-- nombre -->
        <input type="text" id="nombre" class="form-control mb-3" placeholder="Nombre">

        <!-- raza -->
        <input type="text" id="raza" class="form-control mb-3" placeholder="Raza">

        <!-- edad -->
        <div class="row mb-3">
            <div class="col">
                <input type="number" id="edadAnios" class="form-control" placeholder="Años">
            </div>
            <div class="col">
                <input type="number" id="edadMeses" class="form-control" placeholder="Meses">
            </div>
        </div>

        <!-- otros campos -->
        <input type="text" id="porte" class="form-control mb-3" placeholder="Porte">
        <input type="text" id="energia" class="form-control mb-3" placeholder="Energía">
        <textarea id="descripcion" class="form-control mb-3" placeholder="Descripción"></textarea>

        <!-- preview -->
        <img id="preview">

        <!-- imagen -->
        <input type="file" id="imagen" class="form-control mb-3">

        <!-- submit -->
        <button class="btn btn-success w-100 mb-2">Publicar</button>

        <!-- volver -->
        <a href="rescatista.html" class="btn btn-light w-100">Volver</a>

    </form>

</div>

<script src="js/utils.js"></script>
<script src="js/auth.js"></script>

<script>

// token
const token = localStorage.getItem("token");

// user
let user = null;

try {
    user = JSON.parse(localStorage.getItem("user"));
} catch {
    user = null;
}

// rol
const rol = user?.rol?.toLowerCase()?.trim();

// protección
if (!token || !user || rol !== "rescatista") {
    window.location.href = "index.html";
}

// preview imagen
document.getElementById("imagen").addEventListener("change", e => {

    const file = e.target.files[0];

    if (!file) return;

    if (!file.type.startsWith("image/")) {
        mostrarMensaje("Debe ser una imagen", "warning");
        return;
    }

    const preview = document.getElementById("preview");

    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
});

// submit
document.getElementById("formMascota").addEventListener("submit", async e => {

    e.preventDefault();

    const nombre = nombre.value.trim();
    const raza = raza.value.trim();
    const anios = edadAnios.value.trim();
    const meses = edadMeses.value.trim();
    const porte = porte.value.trim();
    const energia = energia.value.trim();
    const descripcion = descripcion.value.trim();

    if (!nombre || !raza || (!anios && !meses) || !porte || !energia || !descripcion) {
        mostrarMensaje("Completa todos los campos", "warning");
        return;
    }

    const edad = `${anios ? anios+" años":""} ${meses ? meses+" meses":""}`.trim();

    const formData = new FormData();

    formData.append("nombre", nombre);
    formData.append("raza", raza);
    formData.append("edad", edad);
    formData.append("porte", porte);
    formData.append("energia", energia);
    formData.append("descripcion", descripcion);

    const file = imagen.files[0];
    if (file) formData.append("imagen", file);

    try {

        const res = await fetch("/api/mascotas", {
            method:"POST",
            headers:{ Authorization:"Bearer "+token },
            body:formData
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.message);

        mostrarMensaje("Mascota publicada 🐾", "success");

        setTimeout(()=> window.location.href="rescatista.html",1000);

    } catch (error) {

        console.error(error);
        mostrarMensaje(error.message,"danger");
    }

});

</script>

</body>
</html>
