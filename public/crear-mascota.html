<!DOCTYPE html> <!-- HTML5 -->

<html lang="es">

<head>

    <!-- Codificación -->
    <meta charset="UTF-8">

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- TÍTULO -->
    <title>🐾 Crear Mascota</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>

        /* FONDO */
        body {
            font-family: 'Poppins', sans-serif;
            background-image: url("img/Huellitas_de_Amor.jpg");
            background-size: cover;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* OVERLAY */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(
                rgba(0,0,0,0.7),
                rgba(0,0,0,0.5)
            );
            z-index: -1;
        }

        /* TARJETA */
        .card {
            border-radius: 25px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            animation: fadeIn 0.6s ease;
        }

        /* ANIMACIÓN */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* INPUTS */
        .form-control {
            border-radius: 12px;
            border: none;
        }

        /* BOTÓN */
        .btn-success {
            border-radius: 12px;
            background: linear-gradient(135deg, #28a745, #20c997);
            border: none;
        }

        /* PREVIEW IMAGEN */
        #preview {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 10px;
            display: none;
        }

    </style>

</head>

<body>

<div class="card">

    <!-- TÍTULO -->
    <h3 class="text-center mb-3">🐶 Publicar Mascota</h3>

    <!-- FORM -->
    <form id="formMascota">

        <!-- NOMBRE -->
        <input type="text" id="nombre" class="form-control mb-3" placeholder="Nombre" required>

        <!-- EDAD -->
        <input type="number" id="edad" class="form-control mb-3" placeholder="Edad" required>

        <!-- PORTE -->
        <input type="text" id="porte" class="form-control mb-3" placeholder="Porte">

        <!-- ENERGÍA -->
        <input type="text" id="energia" class="form-control mb-3" placeholder="Energía">

        <!-- DESCRIPCIÓN -->
        <textarea id="descripcion" class="form-control mb-3" placeholder="Descripción"></textarea>

        <!-- PREVIEW -->
        <img id="preview">

        <!-- IMAGEN -->
        <input type="file" id="imagen" class="form-control mb-3">

        <!-- BOTÓN -->
        <button class="btn btn-success w-100 mb-2">
            Publicar
        </button>

        <!-- VOLVER -->
        <a href="mascotas.html" class="btn btn-light w-100">
            Volver
        </a>

    </form>

</div>

<script>

    // --------------------------------------------------
    // PREVIEW IMAGEN (🔥 WOW)
    // --------------------------------------------------

    document.getElementById("imagen").addEventListener("change", function(e) {

        const file = e.target.files[0];

        if (!file) return;

        const preview = document.getElementById("preview");

        preview.src = URL.createObjectURL(file);

        preview.style.display = "block";
    });

    // --------------------------------------------------
    // FORM
    // --------------------------------------------------

    const form = document.getElementById("formMascota");

    form.addEventListener("submit", async (e) => {

        e.preventDefault();

        const token = localStorage.getItem("token");

        const formData = new FormData();

        formData.append("nombre", nombre.value);
        formData.append("edad", edad.value);
        formData.append("porte", porte.value);
        formData.append("energia", energia.value);
        formData.append("descripcion", descripcion.value);

        const file = imagen.files[0];

        if (file) formData.append("imagen", file);

        const res = await fetch("/api/mascotas", {
            method: "POST",
            headers: {
                Authorization: "Bearer " + token
            },
            body: formData
        });

        if (res.ok) {
            alert("Mascota publicada 🐾");
            window.location.href = "mascotas.html";
        } else {
            alert("Error al crear");
        }

    });

</script>

</body>
</html>
