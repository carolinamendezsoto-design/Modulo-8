<!DOCTYPE html> <!-- HTML5 -->

<html lang="es"> <!-- idioma -->

<head>

<meta charset="UTF-8"> <!-- caracteres -->
<meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- responsive -->

<title>🐾 Crear Mascota</title> <!-- título -->

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Fuente -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* Fondo */
body {
    font-family:'Poppins', sans-serif; /* fuente */
    background:url("img/Huellitas_Ultra_Premium.png") center/cover fixed; /* fondo */
    display:flex; /* centrado */
    align-items:center;
    justify-content:center;
    min-height:100vh;
}

/* Overlay */
body::before {
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    z-index:-1;
}

/* Card */
.card {
    border-radius:25px;
    padding:30px;
    max-width:500px;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.2);
    color:white;
    box-shadow:0 25px 50px rgba(0,0,0,0.4);
}

/* Inputs */
.form-control {
    border-radius:12px;
}

/* Preview */
#preview {
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:15px;
    margin-bottom:10px;
    display:none;
}

</style>

</head>

<body>

<div class="card">

    <h3 class="text-center mb-3">🐶 Publicar Mascota</h3>

    <form id="formMascota">

        <!-- nombre -->
        <input type="text" id="nombre" class="form-control mb-3" placeholder="Nombre">

        <!-- raza -->
        <input type="text" id="raza" class="form-control mb-3" placeholder="Raza">

        <!-- edad -->
        <div class="row mb-3">
            <div class="col">
                <input type="number" id="edadAnios" class="form-control" placeholder="Años">
            </div>
            <div class="col">
                <input type="number" id="edadMeses" class="form-control" placeholder="Meses">
            </div>
        </div>

        <!-- tamaño / porte -->
        <label class="form-label mb-2 fw-semibold">Tamaño y Porte:</label>
        <div class="d-flex flex-wrap gap-2 mb-3">
            <input type="radio" class="btn-check" name="porte" id="porteEG" value="Extra grande" required>
            <label class="btn btn-outline-light rounded-pill" for="porteEG">Extra grande</label>

            <input type="radio" class="btn-check" name="porte" id="porteG" value="Grande" required>
            <label class="btn btn-outline-light rounded-pill" for="porteG">Grande</label>

            <input type="radio" class="btn-check" name="porte" id="porteM" value="Mediano" required>
            <label class="btn btn-outline-light rounded-pill" for="porteM">Mediano</label>

            <input type="radio" class="btn-check" name="porte" id="porteP" value="Pequeño" required>
            <label class="btn btn-outline-light rounded-pill" for="porteP">Pequeño</label>

            <input type="radio" class="btn-check" name="porte" id="porteT" value="Toy" required>
            <label class="btn btn-outline-light rounded-pill" for="porteT">Toy</label>
        </div>

        <!-- energía -->
        <label class="form-label mb-2 fw-semibold">Nivel de Energía:</label>
        <div class="d-flex flex-wrap gap-2 mb-3">
            <input type="radio" class="btn-check" name="energia" id="energiaA" value="Alta" required>
            <label class="btn btn-outline-light rounded-pill" for="energiaA">Alta</label>

            <input type="radio" class="btn-check" name="energia" id="energiaM" value="Media" required>
            <label class="btn btn-outline-light rounded-pill" for="energiaM">Media</label>

            <input type="radio" class="btn-check" name="energia" id="energiaB" value="Baja" required>
            <label class="btn btn-outline-light rounded-pill" for="energiaB">Baja</label>
        </div>
        
        <textarea id="descripcion" class="form-control mb-3" placeholder="Descripción breve..."></textarea>

        <!-- preview -->
        <img id="preview">

        <!-- imagen -->
        <input type="file" id="imagen" class="form-control mb-3">

        <!-- submit -->
        <button class="btn btn-success w-100 mb-2">Publicar</button>

        <!-- volver -->
        <a href="rescatista.html" class="btn btn-light w-100">Volver</a>

    </form>

</div>

<script src="js/utils.js"></script>
<script src="js/auth.js"></script> <!-- script de autenticación para resguardar las rutas -->
<script src="js/crear-mascota.js"></script> <!-- lógica y validación del formulario para crear la mascota -->

</body>
</html>
