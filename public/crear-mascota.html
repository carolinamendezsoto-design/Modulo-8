<!DOCTYPE html> <!-- HTML5 -->

<html lang="es"> <!-- Idioma -->

<head>

    <!-- Codificación -->
    <meta charset="UTF-8">

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título -->
    <title>🐾 Crear Mascota</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>

        /* BODY */
        body {
            font-family: 'Poppins', sans-serif;
            background-image: url("img/Huellitas_de_Amor.jpg");
            background-size: cover;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* OVERLAY */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(
                rgba(0,0,0,0.7),
                rgba(0,0,0,0.5)
            );
            z-index: -1;
        }

        /* CARD */
        .card {
            border-radius: 25px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        .form-control {
            border-radius: 12px;
            border: none;
        }

        .btn-success {
            border-radius: 12px;
            background: linear-gradient(135deg, #28a745, #20c997);
            border: none;
        }

        #preview {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 10px;
            display: none;
        }

    </style>

</head>

<body>

<div class="card">

    <!-- TÍTULO -->
    <h3 class="text-center mb-3">🐶 Publicar Mascota</h3>

    <!-- FORM -->
    <form id="formMascota">

        <input type="text" id="nombre" class="form-control mb-3" placeholder="Nombre">

        <input type="number" id="edad" class="form-control mb-3" placeholder="Edad">

        <input type="text" id="porte" class="form-control mb-3" placeholder="Porte">

        <input type="text" id="energia" class="form-control mb-3" placeholder="Energía">

        <textarea id="descripcion" class="form-control mb-3" placeholder="Descripción"></textarea>

        <img id="preview">

        <input type="file" id="imagen" class="form-control mb-3">

        <button class="btn btn-success w-100 mb-2">
            Publicar
        </button>

        <a href="rescatista.html" class="btn btn-light w-100">
            Volver
        </a>

    </form>

</div>

<script src="js/utils.js"></script>
<script src="js/auth.js"></script>

<script>

    // --------------------------------------------------
    // VARIABLES
    // --------------------------------------------------

    const token = localStorage.getItem("token");

    let user = null;

    try {
        user = JSON.parse(localStorage.getItem("user"));
    } catch {
        user = null;
    }


    // --------------------------------------------------
    // PROTECCIÓN
    // --------------------------------------------------

    if (!token || !user || user.rol !== "rescatista") {

        mostrarMensaje("Acceso solo rescatista", "danger");

        setTimeout(() => {
            window.location.href = "index.html";
        }, 800);
    }


    // --------------------------------------------------
    // PREVIEW IMAGEN
    // --------------------------------------------------

    document.getElementById("imagen").addEventListener("change", e => {

        const file = e.target.files[0];

        if (!file) return;

        // Validar tipo imagen
        if (!file.type.startsWith("image/")) {
            mostrarMensaje("Archivo debe ser una imagen", "warning");
            return;
        }

        const preview = document.getElementById("preview");

        preview.src = URL.createObjectURL(file);

        preview.style.display = "block";
    });


    // --------------------------------------------------
    // FORM SUBMIT
    // --------------------------------------------------

    document.getElementById("formMascota").addEventListener("submit", async e => {

        e.preventDefault();

        // Obtener valores correctamente
        const nombre = document.getElementById("nombre").value.trim();
        const edad = document.getElementById("edad").value.trim();
        const porte = document.getElementById("porte").value.trim();
        const energia = document.getElementById("energia").value.trim();
        const descripcion = document.getElementById("descripcion").value.trim();
        const imagenInput = document.getElementById("imagen");

        // Validación
        if (!nombre || !edad || !porte || !energia || !descripcion) {
            mostrarMensaje("Completa todos los campos", "warning");
            return;
        }

        const formData = new FormData();

        formData.append("nombre", nombre);
        formData.append("edad", edad);
        formData.append("porte", porte);
        formData.append("energia", energia);
        formData.append("descripcion", descripcion);

        const file = imagenInput.files[0];

        if (file) {
            formData.append("imagen", file);
        }

        try {

            const res = await fetch("/api/mascotas", {

                method: "POST",

                headers: {
                    Authorization: "Bearer " + token
                },

                body: formData
            });

            const data = await res.json();

            if (!res.ok) {
                throw new Error(data.message || "Error al crear mascota");
            }

            mostrarMensaje("Mascota publicada 🐾", "success");

            setTimeout(() => {
                window.location.href = "rescatista.html";
            }, 1200);

        } catch (error) {

            console.error(error);

            mostrarMensaje(error.message, "danger");
        }

    });

</script>

</body>
</html>
