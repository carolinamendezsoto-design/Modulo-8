<!-- ===================================================== -->
<!-- DOCUMENTO HTML5 -->
<!-- ===================================================== -->
<!DOCTYPE html>

<!-- Idioma -->
<html lang="es">

<head>

    <!-- Codificación UTF-8 -->
    <meta charset="UTF-8">

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título -->
    <title>🐾 Postulantes</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<!-- Body con fondo -->
<body class="p-4 text-white" style="background:url('img/Huellitas_de_Amor.jpg') center/cover fixed;">

<div class="container">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <!-- Título -->
        <h3>📋 Postulantes</h3>

        <div>

            <!-- Botón volver -->
            <a href="mascotas.html" class="btn btn-light btn-sm me-2">
                ← Volver
            </a>

            <!-- Logout -->
            <button class="btn btn-danger btn-sm" onclick="logout()">
                Cerrar sesión
            </button>

        </div>

    </div>

    <!-- CONTENEDOR PRINCIPAL -->
    <div id="contenedorPostulantes"></div>

</div>

<!-- Scripts base -->
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>

<script>

// --------------------------------------------------
// VARIABLES GLOBALES
// --------------------------------------------------

// Obtenemos token desde localStorage
const token = localStorage.getItem("token");

// Obtenemos usuario (puede fallar → try/catch)
let user = null;

try {
    user = JSON.parse(localStorage.getItem("user"));
} catch {
    user = null;
}

// Obtenemos contenedor HTML
const contenedor = document.getElementById("contenedorPostulantes");

// --------------------------------------------------
// OBTENER ID DESDE URL
// --------------------------------------------------

// Creamos objeto con parámetros de la URL
const params = new URLSearchParams(window.location.search);

// Obtenemos id de mascota (?id=1)
const mascotaId = params.get("id");


// --------------------------------------------------
// PROTECCIÓN DE ACCESO
// --------------------------------------------------

// Si no hay token o usuario
if (!token || !user) {

    // Mostramos mensaje
    mostrarMensaje("Debes iniciar sesión", "danger");

    // Redirigimos
    window.location.href = "index.html";
}


// --------------------------------------------------
// VALIDAR ID
// --------------------------------------------------

// Si no viene id en la URL
if (!mascotaId) {

    mostrarMensaje("Mascota no especificada", "danger");

    window.location.href = "mascotas.html";
}


// --------------------------------------------------
// CARGAR POSTULANTES
// --------------------------------------------------

// Función principal
async function cargarPostulantes() {

    try {

        // Mostramos loading
        contenedor.innerHTML = "<p>Cargando postulantes...</p>";

        // Petición al backend
        const res = await fetch(`/api/solicitudes/mascota/${mascotaId}`, {

            // Enviamos token
            headers: {
                Authorization: "Bearer " + token
            }
        });

        // Si token inválido
        if (res.status === 401) {

            localStorage.clear();
            window.location.href = "index.html";
            return;
        }

        // Convertimos respuesta a JSON
        const data = await res.json();

        // Validamos error
        if (!res.ok) {
            throw new Error(data.message || "Error al cargar postulantes");
        }

        // Normalizamos datos
        const postulantes = data.data || [];

        // Limpiamos contenedor
        contenedor.innerHTML = "";

        // Si no hay postulantes
        if (!postulantes.length) {

            contenedor.innerHTML = "<p>No hay postulantes</p>";

            return;
        }

        // --------------------------------------------------
        // RECORRER POSTULANTES
        // --------------------------------------------------

        postulantes.forEach(p => {

            // ⚠️ FIX CRÍTICO
            // Puede venir como usuario o adoptante
            const persona = p.usuario || p.adoptante || {};

            // Creamos card
            const div = document.createElement("div");

            div.className = "card p-3 mb-3 text-dark";

            div.innerHTML = `
                <h5>${persona.nombre || "Sin nombre"}</h5>

                <p><strong>Email:</strong> ${persona.email || "Sin email"}</p>

                <p>${p.mensaje || "Sin mensaje"}</p>

                <button 
                    class="btn btn-success"
                    onclick="seleccionar(${p.id})"
                >
                    Seleccionar adoptante
                </button>
            `;

            // Insertamos en el DOM
            contenedor.appendChild(div);
        });

    } catch (error) {

        // Debug
        console.error("ERROR POSTULANTES:", error);

        // Mensaje usuario
        mostrarMensaje(error.message, "danger");
    }
}


// --------------------------------------------------
// SELECCIONAR ADOPTANTE
// --------------------------------------------------

// Función para aprobar adopción
async function seleccionar(id) {

    try {

        // Petición PUT
        const res = await fetch(`/api/solicitudes/seleccionar/${id}`, {

            method: "PUT",

            headers: {
                Authorization: "Bearer " + token
            }
        });

        const data = await res.json();

        // Validamos error
        if (!res.ok) {
            throw new Error(data.message || "Error al seleccionar");
        }

        // Mensaje éxito
        mostrarMensaje("Adopción completada 🎉");

        // Redirección con delay
        setTimeout(() => {
            window.location.href = "rescatista.html";
        }, 1200);

    } catch (error) {

        console.error(error);

        mostrarMensaje(error.message, "danger");
    }
}


// --------------------------------------------------
// INIT
// --------------------------------------------------

// Ejecutamos al cargar
document.addEventListener("DOMContentLoaded", cargarPostulantes);

</script>

</body>
</html>
