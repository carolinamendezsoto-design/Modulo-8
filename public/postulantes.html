<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8"> <!-- Codificación -->
<meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsive -->

<title>📋 Postulantes</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Fuente -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* Fondo */
body {
    font-family:'Poppins', sans-serif;
}

/* Overlay */
body::before {
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    z-index:-1;
}

/* Card glass */
.card {
    border-radius:20px;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.2);
    color:white;
    box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

</style>

</head>

<body class="p-4 text-white" style="background:url('img/Huellitas_Ultra_Premium.png') center/cover fixed;">

<div class="container">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <h3>📋 Postulantes</h3>

        <div>

            <a href="mascotas.html" class="btn btn-light btn-sm me-2">
                ← Volver
            </a>

            <button class="btn btn-danger btn-sm" onclick="logout()">
                Cerrar sesión
            </button>

        </div>

    </div>

    <!-- CONTENEDOR -->
    <div id="contenedorPostulantes"></div>

</div>

<script src="js/utils.js"></script>
<script src="js/auth.js"></script>

<script>

// ===================== TOKEN =====================
const token = localStorage.getItem("token");

// ===================== USER =====================
let user = null;

try {
    user = JSON.parse(localStorage.getItem("user"));
} catch {
    user = null;
}

// ===================== VALIDACIÓN =====================
if (!token || !user) {
    mostrarMensaje("Debes iniciar sesión", "danger");
    setTimeout(() => window.location.href = "index.html", 800);
}

// ===================== PARAMS =====================
const params = new URLSearchParams(window.location.search);
const mascotaId = params.get("id");

// Validación ID
if (!mascotaId) {
    mostrarMensaje("Mascota no especificada", "danger");
    setTimeout(() => window.location.href = "mascotas.html", 800);
}

// ===================== CONTENEDOR =====================
const contenedor = document.getElementById("contenedorPostulantes");

// ===================== CARGAR =====================
async function cargarPostulantes() {

    try {

        contenedor.innerHTML = "<p>Cargando postulantes...</p>";

        const res = await fetch(`/api/solicitudes/mascota/${mascotaId}`, {
            headers: { Authorization: "Bearer " + token }
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.message);

        const postulantes = data.data || [];

        contenedor.innerHTML = "";

        if (!postulantes.length) {
            contenedor.innerHTML = "<p>No hay postulantes aún 🐾</p>";
            return;
        }

        // ===================== RENDER =====================
        postulantes.forEach(p => {

            const persona = p.adoptante || {};

            const estadoColor =
                p.estado === "aprobado" ? "success" :
                p.estado === "rechazado" ? "danger" : "warning";

            const div = document.createElement("div");

            div.className = "card p-3 mb-3";

            div.innerHTML = `
                <h5>${persona.nombre || "Sin nombre"}</h5>

                ${
                    p.estado === "aprobado"
                    ? `
                        <p><strong>Email:</strong> ${persona.email}</p>
                        <p class="text-success fw-bold">🎉 Adoptante seleccionado</p>
                    `
                    : `
                        <p class="text-light">🔒 Email oculto</p>
                    `
                }

                <p>${p.mensaje || "Sin mensaje"}</p>

                <span class="badge bg-${estadoColor} mb-2">
                    ${p.estado}
                </span>

                <button 
                    class="btn btn-success w-100"
                    onclick="seleccionar(${p.id})"
                    ${p.estado === "aprobado" ? "disabled" : ""}
                >
                    Seleccionar adoptante
                </button>
            `;

            contenedor.appendChild(div);
        });

    } catch (error) {

        console.error(error);
        mostrarMensaje(error.message, "danger");
    }
}

// ===================== SELECCIONAR =====================
async function seleccionar(id) {

    try {

        const res = await fetch(`/api/solicitudes/seleccionar/${id}`, {
            method:"PUT",
            headers:{ Authorization:"Bearer "+token }
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.message);

        mostrarMensaje("Adopción completada 🎉", "success");

        setTimeout(cargarPostulantes, 800);

    } catch (error) {

        console.error(error);
        mostrarMensaje(error.message, "danger");
    }
}

// ===================== INIT =====================
document.addEventListener("DOMContentLoaded", cargarPostulantes);

</script>

</body>
</html>
