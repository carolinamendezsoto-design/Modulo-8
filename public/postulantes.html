<!DOCTYPE html> <!-- HTML5 -->

<html lang="es"> <!-- Idioma -->

<head>

    <!-- Codificación -->
    <meta charset="UTF-8">

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título -->
    <title>🐾 Postulantes</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>

        body {
            font-family: 'Poppins', sans-serif;
            background-image: url("img/Huellitas_de_Amor.jpg");
            background-size: cover;
            background-attachment: fixed;
            padding: 20px;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(
                rgba(0,0,0,0.6),
                rgba(0,0,0,0.4)
            );
            z-index: -1;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: white;
        }

        .card {
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }

        .mini {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
        }

        .btn {
            border-radius: 10px;
        }

    </style>

</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">

        <h3>📋 Postulantes</h3>

        <div>

            <a href="mascotas.html" class="btn btn-light btn-sm me-2">
                ← Volver
            </a>

            <button class="btn btn-danger btn-sm" onclick="logout()">
                Cerrar sesión
            </button>

        </div>

    </div>

    <!-- CONTENEDOR -->
    <div id="contenedorPostulantes"></div>

</div>

<!-- SCRIPTS -->
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>

<script>

    // --------------------------------------------------
    // VARIABLES
    // --------------------------------------------------

    const token = localStorage.getItem("token"); // token

    const user = JSON.parse(localStorage.getItem("user")) || null; // usuario

    const contenedor = document.getElementById("contenedorPostulantes"); // DOM


    // --------------------------------------------------
    // OBTENER ID DESDE URL
    // --------------------------------------------------

    const params = new URLSearchParams(window.location.search);

    const mascotaId = params.get("id"); // ?id=1


    // --------------------------------------------------
    // PROTECCIÓN
    // --------------------------------------------------

    if (!token || !user) {

        mostrarMensaje("Debes iniciar sesión", "danger");

        window.location.href = "index.html";
    }


    // --------------------------------------------------
    // VALIDAR ID
    // --------------------------------------------------

    if (!mascotaId) {

        mostrarMensaje("Mascota no especificada", "danger");

        window.location.href = "mascotas.html";
    }


    // --------------------------------------------------
    // CARGAR POSTULANTES
    // --------------------------------------------------

    async function cargarPostulantes() {

        try {

            contenedor.innerHTML = "<p class='text-white'>Cargando postulantes...</p>";

            const res = await fetch(`/api/solicitudes/mascota/${mascotaId}`, {
                headers: {
                    Authorization: "Bearer " + token
                }
            });

            const data = await res.json();

            if (!res.ok) {
                throw new Error(data.message || "Error al cargar postulantes");
            }

            const postulantes = data.data || [];

            contenedor.innerHTML = "";

            if (!postulantes.length) {
                contenedor.innerHTML = "<p class='text-white'>No hay postulantes</p>";
                return;
            }

            postulantes.forEach(p => {

                contenedor.innerHTML += `
                    <div class="card">

                        <h5>${p.adoptante.nombre}</h5>

                        <p><strong>Email:</strong> ${p.adoptante.email}</p>

                        <p>${p.mensaje || "Sin mensaje"}</p>

                        <button 
                            class="btn btn-success"
                            onclick="seleccionar(${p.id})"
                        >
                            Seleccionar adoptante ✅
                        </button>

                    </div>
                `;
            });

        } catch (error) {

            console.error(error);

            mostrarMensaje(error.message, "danger");
        }
    }


    // --------------------------------------------------
    // SELECCIONAR ADOPTANTE
    // --------------------------------------------------

    async function seleccionar(id) {

        try {

            const res = await fetch(`/api/solicitudes/seleccionar/${id}`, {

                method: "PUT",

                headers: {
                    Authorization: "Bearer " + token
                }
            });

            const data = await res.json();

            if (!res.ok) {
                throw new Error(data.message || "Error al seleccionar");
            }

            mostrarMensaje("Adopción completada 🎉", "success");

            setTimeout(() => {
                window.location.href = "rescatista.html";
            }, 1200);

        } catch (error) {

            console.error(error);

            mostrarMensaje(error.message, "danger");
        }
    }


    // --------------------------------------------------
    // INIT
    // --------------------------------------------------

    cargarPostulantes();

</script>

</body>
</html>
