<!DOCTYPE html> <!-- HTML5 -->

<html lang="es"> <!-- idioma -->

<head>

<!-- ================= META ================= -->

<meta charset="UTF-8"> <!-- caracteres especiales -->
<meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- responsive -->

<title>🐾 Usuarios</title> <!-- título -->

<!-- ================= LIBRERÍAS ================= -->

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> <!-- bootstrap -->

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"> <!-- fuente -->

<!-- ================= ESTILOS ================= -->

<style>

/* Fuente + fondo */
body {
    font-family:'Poppins', sans-serif; /* tipografía */
    background:url("img/Huellitas_Ultra_Premium.png") center/cover fixed; /* fondo */
    padding:20px; /* espacio */
}

/* Overlay oscuro */
body::before {
    content:""; /* requerido */
    position:fixed; /* pantalla completa */
    inset:0; /* full */
    background:rgba(0,0,0,0.6); /* oscurece */
    z-index:-1; /* detrás */
}

/* Header */
.header {
    display:flex; /* flex */
    justify-content:space-between; /* separación */
    align-items:center; /* centrado */
    margin-bottom:20px; /* espacio */
    color:white; /* texto */
}

/* Card contenedor */
.card {
    border-radius:20px; /* bordes */
    padding:20px; /* espacio */
    background:rgba(0,0,0,0.6); /* dark glass */
    backdrop-filter:blur(12px); /* blur */
    border:1px solid rgba(255,255,255,0.2); /* borde */
    color:white; /* texto */
}

/* Item usuario */
.user-item {
    padding:15px; /* espacio */
    border-radius:12px; /* bordes */
    margin-bottom:10px; /* separación */
    background:rgba(255,255,255,0.1); /* fondo */
    display:flex; /* flex */
    justify-content:space-between; /* separar */
    align-items:center; /* centrado */
}

/* Botones */
.btn {
    border-radius:10px; /* redondeo */
}

</style>

</head>

<body>

<div class="container"> <!-- contenedor -->

    <!-- ================= HEADER ================= -->
    <div class="header">

        <h3>👤 Gestión de Usuarios</h3> <!-- título -->

        <div>

            <!-- volver -->
            <a href="admin.html" class="btn btn-light btn-sm me-2">
                ← Volver
            </a>

            <!-- logout -->
            <button class="btn btn-danger btn-sm" onclick="logout()">
                Cerrar sesión
            </button>

        </div>

    </div>

    <!-- ================= CARD ================= -->
    <div class="card">

        <!-- botón recargar -->
        <button class="btn btn-primary mb-3" onclick="cargarUsuarios()">
            🔄 Cargar usuarios
        </button>

        <!-- lista -->
        <div id="listaUsuarios"></div>

    </div>

</div>

<!-- ================= SCRIPTS ================= -->

<script src="js/utils.js"></script> <!-- mensajes -->
<script src="js/auth.js"></script> <!-- auth -->
<script src="js/usuarios.js"></script> <!-- lógica usuarios -->

<script>

// ================= TOKEN =================
const token = localStorage.getItem("token"); // token

// ================= USER =================
let user = null; // inicializamos

try {
    user = JSON.parse(localStorage.getItem("user")); // parse
} catch {
    user = null; // fallback
}

// ================= NORMALIZAR ROL =================
const rol = user?.rol?.toLowerCase()?.trim(); // formato seguro

// ================= PROTECCIÓN =================
if (!token || !user || rol !== "admin") { // validación

    mostrarMensaje("Acceso solo admin", "danger"); // aviso

    setTimeout(()=> {
        window.location.href = "index.html"; // redirige
    }, 800);
}

// ================= AUTOLOAD =================
cargarUsuarios(); // carga automática

</script>

</body>
</html>
