<!DOCTYPE html> <!-- HTML5 -->

<html lang="es"> <!-- Idioma -->

<head>

    <!-- Codificación -->
    <meta charset="UTF-8">

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título -->
    <title>🐾 Usuarios</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>

        /* -------------------------------------------------- */
        /* FONDO GLOBAL */
        /* -------------------------------------------------- */

        body {

            font-family: 'Poppins', sans-serif;

            background-image: url("img/Huellitas_de_Amor.jpg");

            background-size: cover;

            background-attachment: fixed;

            padding: 20px;
        }

        /* OVERLAY */
        body::before {

            content: "";

            position: fixed;

            inset: 0;

            background: linear-gradient(
                rgba(0,0,0,0.6),
                rgba(0,0,0,0.4)
            );

            z-index: -1;
        }

        /* HEADER */
        .header {

            display: flex;

            justify-content: space-between;

            align-items: center;

            margin-bottom: 20px;

            color: white;
        }

        /* CARD PRINCIPAL */
        .card {

            border-radius: 20px;

            padding: 20px;

            background: rgba(255,255,255,0.15);

            backdrop-filter: blur(12px);

            border: 1px solid rgba(255,255,255,0.2);

            color: white;

            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        /* ITEM USUARIO */
        .user-item {

            padding: 15px;

            border-radius: 12px;

            margin-bottom: 10px;

            background: rgba(255,255,255,0.1);

            display: flex;

            justify-content: space-between;

            align-items: center;
        }

        /* BOTONES */
        .btn {

            border-radius: 10px;
        }

    </style>

</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">

        <h3>👤 Gestión de Usuarios</h3>

        <!-- BOTONES -->
        <div>

            <!-- VOLVER -->
            <a href="admin.html" class="btn btn-light btn-sm me-2">
                ← Volver
            </a>

            <!-- LOGOUT -->
            <button class="btn btn-danger btn-sm" onclick="logout()">
                Cerrar sesión
            </button>

        </div>

    </div>

    <!-- CARD -->
    <div class="card">

        <!-- BOTÓN RECARGAR -->
        <button 
            class="btn btn-primary mb-3"
            onclick="cargarUsuarios()"
        >
            🔄 Cargar usuarios
        </button>

        <!-- CONTENEDOR -->
        <div id="listaUsuarios"></div>

    </div>

</div>

<!-- SCRIPTS -->
<script src="js/utils.js"></script> <!-- mensajes -->
<script src="js/auth.js"></script> <!-- logout -->
<script src="js/usuarios.js"></script> <!-- lógica usuarios -->

<script>

    // --------------------------------------------------
    // PROTECCIÓN ADMIN
    // --------------------------------------------------

    // Obtenemos usuario desde localStorage
    const user = JSON.parse(localStorage.getItem("user")) || {};

    // Validamos acceso
    if (!user || user.rol !== "admin") {

        mostrarMensaje("Acceso solo admin", "danger");

        window.location.href = "mascotas.html";
    }

    // --------------------------------------------------
    // AUTO CARGA
    // --------------------------------------------------

    // Cargamos usuarios automáticamente
    cargarUsuarios();

</script>

</body>
</html>
