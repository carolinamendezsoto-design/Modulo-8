<!DOCTYPE html> <!-- HTML5 -->

<html lang="es"> <!-- Idioma -->

<head>

    <!-- Codificación -->
    <meta charset="UTF-8">

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 🔥 TÍTULO -->
    <title>🐾 Huellitas de Amor</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fuente moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>

        /* -------------------------------------------------- */
        /* FONDO GLOBAL PRO */
        /* -------------------------------------------------- */

        body {

            font-family: 'Poppins', sans-serif;

            /* Imagen de fondo */
            background-image: url("img/Huellitas_de_Amor.jpg");

            background-size: cover;

            background-repeat: no-repeat;

            background-attachment: fixed;

            /* Centrado total */
            display: flex;
            align-items: center;
            justify-content: center;

            min-height: 100vh;
        }

        /* -------------------------------------------------- */
        /* OVERLAY OSCURO (🔥 EFECTO PRO) */
        /* -------------------------------------------------- */

        body::before {

            content: "";

            position: fixed;

            inset: 0;

            /* 🔥 degradado elegante */
            background: linear-gradient(
                rgba(0,0,0,0.6),
                rgba(0,0,0,0.4)
            );

            z-index: -1;
        }

        /* -------------------------------------------------- */
        /* TARJETA GLASS (WOW) */
        /* -------------------------------------------------- */

        .card {

            border-radius: 25px;

            padding: 35px;

            width: 100%;

            max-width: 420px;

            /* 🔥 efecto vidrio */
            background: rgba(255,255,255,0.15);

            backdrop-filter: blur(15px);

            border: 1px solid rgba(255,255,255,0.2);

            box-shadow: 0 25px 50px rgba(0,0,0,0.4);

            color: white;

            animation: fadeIn 0.6s ease;
        }

        /* -------------------------------------------------- */
        /* ANIMACIÓN */
        /* -------------------------------------------------- */

        @keyframes fadeIn {

            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* -------------------------------------------------- */
        /* TÍTULO */
        /* -------------------------------------------------- */

        .title {

            font-weight: 600;

            text-align: center;

            margin-bottom: 10px;
        }

        /* -------------------------------------------------- */
        /* TEXTO */
        /* -------------------------------------------------- */

        .intro {

            font-size: 14px;

            color: rgba(255,255,255,0.85);

            margin-bottom: 20px;
        }

        /* -------------------------------------------------- */
        /* INPUTS */
        /* -------------------------------------------------- */

        .form-control {

            border-radius: 12px;

            padding: 12px;

            border: none;
        }

        /* -------------------------------------------------- */
        /* BOTÓN PRO */
        /* -------------------------------------------------- */

        .btn-primary {

            border-radius: 12px;

            font-weight: 500;

            border: none;

            background: linear-gradient(135deg, #667eea, #764ba2);

            transition: 0.3s;
        }

        .btn-primary:hover {

            transform: scale(1.05);
        }

        /* -------------------------------------------------- */
        /* PERRITO DECORATIVO 🐶 */
        /* -------------------------------------------------- */

        .dog {

            font-size: 40px;

            text-align: center;

            margin-bottom: 10px;

            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {

            0%,100% { transform: translateY(0); }

            50% { transform: translateY(-8px); }
        }

        /* LINK */
        a {
            color: #ddd;
        }

    </style>

</head>

<body>

<!-- -------------------------------------------------- -->
<!-- TARJETA -->
<!-- -------------------------------------------------- -->

<div class="card text-center">

    <!-- 🐶 PERRITO -->
    <div class="dog">🐶</div>

    <!-- TÍTULO -->
    <h2 class="title">Huellitas de Amor</h2>

    <!-- INTRO -->
    <p class="intro">

        Plataforma de adopción de mascotas enfocada en la comuna de Puente Alto.

        <br><br>

        Conectamos rescatistas con adoptantes para dar una segunda oportunidad.

        <br><br>

        Versión inicial (MVP).

    </p>

    <!-- EMAIL -->
    <input 
        type="email"
        id="loginEmail"
        class="form-control mb-3"
        placeholder="Correo electrónico"
    >

    <!-- PASSWORD -->
    <input 
        type="password"
        id="loginPassword"
        class="form-control mb-3"
        placeholder="Contraseña"
    >

    <!-- BOTÓN -->
    <button 
        class="btn btn-primary w-100 mb-2"
        onclick="login()"
    >
        Ingresar
    </button>

    <!-- LINK -->
    <a href="registro.html">
        ¿No tienes cuenta? Crear cuenta
    </a>

</div>

<!-- SCRIPTS -->
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
