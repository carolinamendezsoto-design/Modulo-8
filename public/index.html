<!DOCTYPE html> <!-- HTML5 -->

<html lang="es"> <!-- idioma -->

<head>

<meta charset="UTF-8"> <!-- caracteres -->
<meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- responsive -->

<title>🐾 Huellitas de Amor</title> <!-- título -->

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Fuente -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* Fondo */
body {
    font-family:'Poppins', sans-serif;
    background:url("img/Huellitas_de_Amor.jpg") center/cover fixed;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
}

/* Overlay */
body::before {
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    z-index:-1;
}

/* Card */
.card {
    border-radius:25px;
    padding:35px;
    max-width:420px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.2);
    color:white;
}

/* Inputs */
.form-control {
    border-radius:12px;
}

</style>

</head>

<body>

<div class="card">

    <h2 class="text-center mb-3">Huellitas de Amor</h2> <!-- título -->

    <!-- EMAIL -->
    <input type="email" id="loginEmail" class="form-control mb-3" placeholder="Correo electrónico">

    <!-- PASSWORD -->
    <input type="password" id="loginPassword" class="form-control mb-3" placeholder="Contraseña">

    <!-- BOTÓN -->
    <button class="btn btn-primary w-100 mb-2" onclick="handleLogin()">
        Ingresar
    </button>

    <!-- LINK -->
    <a href="registro.html">Crear cuenta</a>

</div>

<script src="js/utils.js"></script>
<script src="js/auth.js"></script>

<script>

// ================= LOGIN =================
function handleLogin() {

    // inputs
    const emailInput = document.getElementById("loginEmail");
    const passwordInput = document.getElementById("loginPassword");

    // valores
    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();

    // validación
    if (!email || !password) {
        mostrarMensaje("Completa todos los campos", "warning");
        return;
    }

    // login backend
    login(email, password);
}

</script>

</body>
</html>
