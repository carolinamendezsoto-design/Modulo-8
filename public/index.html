<!DOCTYPE html> <!-- Indicamos que usamos HTML5 -->

<html lang="es"> <!-- Idioma del documento -->

<head>

    <!-- Codificación para caracteres especiales -->
    <meta charset="UTF-8">

    <!-- Hace la web responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título de la pestaña -->
    <title>🐾 Huellitas de Amor</title>

    <!-- Bootstrap para estilos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fuente moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>

        /* -------------------------------------------------- */
        /* CONFIGURACIÓN GLOBAL */
        /* -------------------------------------------------- */

        body {

            font-family: 'Poppins', sans-serif; /* tipografía */

            background-image: url("img/Huellitas_de_Amor.jpg"); /* imagen fondo */

            background-size: cover; /* cubre toda la pantalla */

            background-repeat: no-repeat; /* evita repetición */

            background-attachment: fixed; /* fondo fijo */

            display: flex; /* centrado */

            align-items: center; /* centrado vertical */

            justify-content: center; /* centrado horizontal */

            min-height: 100vh; /* ocupa toda la pantalla */
        }

        /* -------------------------------------------------- */
        /* OVERLAY OSCURO (EFECTO PRO) */
        /* -------------------------------------------------- */

        body::before {

            content: ""; /* obligatorio */

            position: fixed; /* cubre toda la pantalla */

            inset: 0; /* ocupa todo */

            background: linear-gradient(
                rgba(0,0,0,0.6), /* oscuro arriba */
                rgba(0,0,0,0.4)  /* más claro abajo */
            );

            z-index: -1; /* queda detrás */
        }

        /* -------------------------------------------------- */
        /* TARJETA PRINCIPAL */
        /* -------------------------------------------------- */

        .card {

            border-radius: 25px; /* bordes redondeados */

            padding: 35px; /* espacio interno */

            width: 100%; /* ancho completo */

            max-width: 420px; /* límite ancho */

            background: rgba(255,255,255,0.15); /* efecto vidrio */

            backdrop-filter: blur(15px); /* desenfoque */

            border: 1px solid rgba(255,255,255,0.2); /* borde sutil */

            box-shadow: 0 25px 50px rgba(0,0,0,0.4); /* sombra */

            color: white; /* texto blanco */

            animation: fadeIn 0.6s ease; /* animación */
        }

        /* -------------------------------------------------- */
        /* ANIMACIÓN ENTRADA */
        /* -------------------------------------------------- */

        @keyframes fadeIn {

            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* -------------------------------------------------- */
        /* TÍTULO */
        /* -------------------------------------------------- */

        .title {

            text-align: center;

            font-weight: 600;

            margin-bottom: 10px;
        }

        /* TEXTO DESCRIPTIVO */
        .intro {

            font-size: 14px;

            text-align: center;

            color: rgba(255,255,255,0.85);

            margin-bottom: 20px;
        }

        /* INPUTS */
        .form-control {

            border-radius: 12px;

            padding: 12px;

            border: none;
        }

        /* BOTÓN */
        .btn-primary {

            border-radius: 12px;

            background: linear-gradient(135deg, #667eea, #764ba2);

            border: none;
        }

        /* EFECTO HOVER */
        .btn-primary:hover {

            transform: scale(1.05);
        }

        /* ICONO DECORATIVO */
        .dog {

            font-size: 40px;

            text-align: center;

            margin-bottom: 10px;
        }

        /* LINK */
        a {

            color: #ddd;

            text-decoration: none;
        }

    </style>

</head>

<body>

<!-- TARJETA LOGIN -->
<div class="card">

    <!-- ICONO -->
    <div class="dog">🐶</div>

    <!-- TÍTULO -->
    <h2 class="title">Huellitas de Amor</h2>

    <!-- TEXTO -->
    <p class="intro">
        Plataforma de adopción de mascotas en Puente Alto.
    </p>

    <!-- INPUT EMAIL -->
    <input 
        type="email"
        id="loginEmail"
        class="form-control mb-3"
        placeholder="Correo electrónico"
    >

    <!-- INPUT PASSWORD -->
    <input 
        type="password"
        id="loginPassword"
        class="form-control mb-3"
        placeholder="Contraseña"
    >

    <!-- BOTÓN LOGIN -->
    <button 
        class="btn btn-primary w-100 mb-2"
        onclick="login()"
    >
        Ingresar
    </button>

    <!-- LINK REGISTRO -->
    <a href="registro.html">
        ¿No tienes cuenta? Crear cuenta
    </a>

</div>

<!-- SCRIPTS -->
<script src="js/utils.js"></script> <!-- mensajes -->
<script src="js/auth.js"></script> <!-- login -->

</body>
</html>
