<!DOCTYPE html> <!-- Indicamos HTML5 -->

<html lang="es"> <!-- Idioma español -->

<head>

    <!-- Codificación de caracteres -->
    <meta charset="UTF-8">

    <!-- Responsive para móviles -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título -->
    <title>🐾 Huellitas de Amor</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>

        /* Estilo base del body */
        body {
            font-family: 'Poppins', sans-serif; /* tipografía */
            background-image: url("img/Huellitas_de_Amor.jpg"); /* fondo */
            background-size: cover; /* cubrir pantalla */
            background-repeat: no-repeat; /* no repetir */
            background-attachment: fixed; /* fijo */
            display: flex; /* centrado */
            align-items: center; /* vertical */
            justify-content: center; /* horizontal */
            min-height: 100vh; /* altura completa */
        }

        /* Overlay oscuro */
        body::before {
            content: ""; /* requerido */
            position: fixed; /* ocupa toda pantalla */
            inset: 0; /* full */
            background: linear-gradient(
                rgba(0,0,0,0.6),
                rgba(0,0,0,0.4)
            );
            z-index: -1; /* detrás */
        }

        /* Card principal */
        .card {
            border-radius: 25px;
            padding: 35px;
            width: 100%;
            max-width: 420px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            color: white;
            animation: fadeIn 0.6s ease;
        }

        /* Animación */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Título */
        .title {
            text-align: center;
            font-weight: 600;
            margin-bottom: 10px;
        }

        /* Texto */
        .intro {
            font-size: 14px;
            text-align: center;
            color: rgba(255,255,255,0.85);
            margin-bottom: 20px;
        }

        /* Inputs */
        .form-control {
            border-radius: 12px;
            padding: 12px;
            border: none;
        }

        /* Botón */
        .btn-primary {
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
        }

        .btn-primary:hover {
            transform: scale(1.05);
        }

        /* Icono */
        .dog {
            font-size: 40px;
            text-align: center;
            margin-bottom: 10px;
        }

        /* Links */
        a {
            color: #ddd;
            text-decoration: none;
        }

    </style>

</head>

<body>

<div class="card">

    <!-- Icono -->
    <div class="dog">🐶</div>

    <!-- Título -->
    <h2 class="title">Huellitas de Amor</h2>

    <!-- Descripción -->
    <p class="intro">
        Plataforma de adopción de mascotas en Puente Alto.
    </p>

    <!-- Email -->
    <input 
        type="email"
        id="loginEmail"
        class="form-control mb-3"
        placeholder="Correo electrónico"
    >

    <!-- Password -->
    <input 
        type="password"
        id="loginPassword"
        class="form-control mb-3"
        placeholder="Contraseña"
    >

    <!-- Botón -->
    <button 
        class="btn btn-primary w-100 mb-2"
        onclick="handleLogin()"
    >
        Ingresar
    </button>

    <!-- Link -->
    <a href="registro.html">
        ¿No tienes cuenta? Crear cuenta
    </a>

</div>

<!-- Scripts -->
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>

<script>

    // --------------------------------------------------
    // LOGIN MEJORADO
    // --------------------------------------------------

    function handleLogin() {

        // Obtenemos valores
        const email = document.getElementById("loginEmail").value.trim();
        const password = document.getElementById("loginPassword").value.trim();

        // Validación básica
        if (!email || !password) {
            mostrarMensaje("Completa todos los campos", "warning");
            return;
        }

        // Llamamos función del auth.js
        login(email, password);
    }

</script>

</body>
</html>
