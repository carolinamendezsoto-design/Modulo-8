<!DOCTYPE html> <!-- Indicamos que usamos HTML5 -->

<html lang="es"> <!-- Definimos idioma español -->

<head>

    <!-- Codificación de caracteres (permite tildes, ñ, etc.) -->
    <meta charset="UTF-8">

    <!-- Título de la pestaña del navegador -->
    <title>Login</title>

    <!-- Importamos Bootstrap para estilos rápidos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        /* Fondo con degradado */
        body {
            background: linear-gradient(135deg, #667eea, #764ba2); /* degradado */
            min-height: 100vh; /* ocupa toda la altura de la pantalla */
            display: flex; /* activamos flexbox */
            align-items: center; /* centrado vertical */
            justify-content: center; /* centrado horizontal */
        }

        /* Tarjeta del login */
        .card {
            border-radius: 15px; /* bordes redondeados */
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); /* sombra elegante */
        }

    </style>

</head>

<body>

<!-- Contenedor principal -->
<div class="container">

    <!-- Tarjeta de login -->
    <div class="card p-4">

        <!-- Título -->
        <h3 class="mb-3 text-center">🔐 Iniciar sesión</h3>

        <!-- Input email -->
        <input 
            type="email" 
            id="loginEmail" 
            class="form-control mb-2" 
            placeholder="Email"
        >

        <!-- Input password -->
        <input 
            type="password" 
            id="loginPassword" 
            class="form-control mb-3" 
            placeholder="Password"
        >

        <!-- Botón login -->
        <button 
            class="btn btn-dark w-100 mb-2" 
            onclick="login()" <!-- Llama función del auth.js -->
        >
            Ingresar
        </button>

        <!-- Link para ir al registro -->
        <a 
            href="registro.html" 
            class="text-center d-block"
        >
            Crear cuenta
        </a>

    </div>

</div>

<!-- -------------------------------------------------- -->
<!-- IMPORTANTE: SCRIPTS -->
<!-- -------------------------------------------------- -->

<!-- Funciones reutilizables (alertas, etc.) -->
<script src="/js/utils.js"></script>

<!-- Funciones de autenticación (login, crearUsuario, logout) -->
<script src="/js/auth.js"></script>

</body>
</html>
